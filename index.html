 { term: "link seam", translation: "连接期接缝", explanation: "连接期接缝是软件测试中的一种接缝类型，允许在程序链接时修改行为，用于隔离依赖进行测试。", category: "测试", favorite: false },
 { term: "linked resource", translation: "链接的资源", explanation: "链接的资源指在项目或系统中被引用但存储在其他位置的文件或数据，如共享库或外部配置文件。", category: "软件工程", favorite: false },
 { term: "Liskov Substitution Principle", translation: "里氏替换原则（LSP）", explanation: "里氏替换原则是面向对象设计原则之一，指子类必须能够替换其父类而不影响程序的正确性，确保继承关系的合理性。", category: "软件工程", favorite: false },
 { term: "literal", translation: "字面量、文字常量、直接量", explanation: "字面量是直接在代码中表示固定值的符号，如数字、字符串或布尔值，无需通过变量或计算来定义。", category: "编程语言", favorite: false },
 { term: "living style guides", translation: "活样式指导", explanation: "活样式指导是动态的文档或工具，用于展示和维护前端代码的样式和组件，确保设计一致性并促进团队协作。", category: "前端开发", favorite: false },
 { term: "LLM", translation: "大型语言模型（Large Language Model） ", explanation: "大型语言模型是基于深度学习的自然语言处理模型，通过大量文本训练，能够生成和理解人类语言，用于多种AI任务。", category: "人工智能", favorite: false },
 { term: "load-balancing", translation: "负载平衡", explanation: "负载平衡是分配网络或计算资源的技术，将请求分散到多个服务器上，以提高系统性能、可靠性和可扩展性。", category: "计算机网络", favorite: false },
 { term: "load balancer", translation: "负载平衡器", explanation: "负载平衡器是硬件或软件设备，用于在多个服务器之间分配传入的网络流量，确保高效处理请求并避免单点故障。", category: "计算机网络", favorite: false },
 { term: "load factor", translation: "负载因子", explanation: "负载因子是哈希表中已存储元素数量与桶总数之比，用于衡量哈希表的拥挤程度，影响其性能和扩容决策。", category: "数据结构", favorite: false },
 { term: "load shedding", translation: "减载", explanation: "减载是系统在过载时主动丢弃部分请求或任务，以维持核心功能运行，防止整体崩溃，常见于高负载场景。", category: "软件工程", favorite: false },
 { term: "LOC", translation: "代码行数", explanation: "代码行数是衡量软件项目大小的指标，指源代码中的行数，常用于估算开发工作量、复杂度或维护成本。", category: "软件工程", favorite: false },
 { term: "Local Function", translation: "局部函数", explanation: "局部函数是在另一个函数内部定义的函数，仅在其外部函数的作用域内可见和可用，有助于封装和代码组织。", category: "编程语言", favorite: false },
 { term: "lock-step release", translation: "同步发布", explanation: "指多个软件版本或组件在同一时间点发布，确保依赖关系一致，常用于大型系统或微服务架构中。", category: "软件工程", favorite: false },
 { term: "log", translation: "日志", explanation: "记录系统运行过程中发生的事件或状态的文件，用于调试、监控和审计，帮助开发者追踪问题。", category: "计算机基础", favorite: false },
 { term: "loop", translation: "自循环", explanation: "指程序中的循环结构，允许重复执行一段代码直到满足特定条件，是控制流程的基本概念。", category: "编程语言", favorite: false },
 { term: "loose coupling", translation: "松散耦合", explanation: "系统组件之间依赖关系较弱的设计原则，提高模块独立性和可维护性，便于修改和扩展。", category: "软件工程", favorite: false },
 { term: "Low Fidelity Prototype", translation: "低保真原型，抽象原型视图", explanation: "一种简单的原型设计，通常用草图或线框图表示界面布局，用于快速验证概念和用户交互。", category: "软件工程", favorite: false },
 { term: "low surrogate", translation: "低位代理项", explanation: "Unicode编码中用于表示辅助平面字符的编码单元的一部分，与高位代理项配对形成完整字符。", category: "计算机基础", favorite: false },
 { term: "LSUD", translation: "大批你所不知道的开发人员（Large Set of Unknown Developers）", explanation: "指在大型项目中，许多开发人员对系统整体了解有限，专注于局部模块，可能影响协作和系统一致性。", category: "软件工程", favorite: false },
 { term: "Mainframe", translation: "主机", explanation: "大型、高性能的计算机系统，用于处理关键业务和数据密集型任务，常见于银行和政府机构。", category: "硬件架构", favorite: false },
 { term: "Maintainability", translation: "可维护性", explanation: "软件易于修改、调试和扩展的特性，涉及代码清晰度、文档和模块化设计，降低长期维护成本。", category: "软件工程", favorite: false },
 { term: "managed code", translation: "托管代码", explanation: "在托管环境中运行的代码，如.NET或Java，由运行时环境管理内存、安全等资源，提高开发效率。", category: "编程语言", favorite: false },
 { term: "managed execution", translation: "托管执行", explanation: "托管执行是程序运行时环境（如.NET CLR）自动管理内存分配、垃圾回收、线程调度和安全检查等任务，简化开发并提高安全性。", category: "编程语言", favorite: false },
 { term: "Man-In-The-Middle Attack", translation: "中间人攻击（MITM 攻击）", explanation: "中间人攻击是一种网络安全攻击，攻击者秘密拦截并可能篡改通信双方之间的数据交换，以窃取信息或冒充身份。", category: "网络安全", favorite: false },
 { term: "Management Key", translation: "管理密钥", explanation: "管理密钥是用于控制或管理加密设备（如TPM模块）的密钥，通常用于授权配置更改、密钥备份或访问权限设置。", category: "网络安全", favorite: false },
 { term: "manifest", translation: "清单", explanation: "清单是描述软件组件（如程序集、依赖项或配置）的元数据文件，用于确保正确部署和版本控制，常见于Java JAR或.NET程序集。", category: "软件工程", favorite: false },
 { term: "map", translation: "映射", explanation: "映射是一种数据结构，将键与值关联起来，允许通过键快速查找对应的值，常见实现如哈希表或字典，用于高效数据检索。", category: "数据结构", favorite: false },
 { term: "Market Requirement Document", translation: "市场需求文档（MRD）", explanation: "市场需求文档是描述产品市场机会、目标用户、竞争分析和功能需求的文档，用于指导产品规划和开发方向。", category: "项目管理", favorite: false },
 { term: "Massive Multiplayer Online Role-Playing Game", translation: "大型多人在线角色扮演游戏（MMORPG）", explanation: "大型多人在线角色扮演游戏是一种网络游戏，允许大量玩家在虚拟世界中同时互动、完成任务和角色成长，如《魔兽世界》。", category: "其他", favorite: false },
 { term: "Massively Multiplayer Online Role-Playing Game", translation: "大型多人在线角色扮演游戏（MMORPG）", explanation: "大型多人在线角色扮演游戏是MMORPG的全称，指支持成千上万玩家在线互动的角色扮演游戏，强调社交和持续世界演进。", category: "其他", favorite: false },
 { term: "Mathematical Markup Language", translation: "数学标记语言（MathML）", explanation: "数学标记语言是一种基于XML的标准，用于在网页和文档中描述数学符号和公式，确保数学内容能正确显示和交换。", category: "前端开发", favorite: false },
 { term: "Mean Time Between Failures", translation: "平均故障时间间隔（MTBF）", explanation: "平均故障时间间隔是衡量系统可靠性的指标，表示在两次故障之间的平均运行时间，常用于硬件或软件系统的稳定性评估。", category: "测试", favorite: false },
 { term: "Mean Time To Repair", translation: "平均修复时间（MTTR）", explanation: "平均修复时间（MTTR）是衡量系统可靠性的指标，指从故障发生到系统恢复正常所需的平均时间。", category: "软件工程", favorite: false },
 { term: "Media Service", translation: "媒体服务", explanation: "媒体服务指提供音频、视频等多媒体内容处理、存储、传输和分发的软件或平台服务。", category: "其他", favorite: false },
 { term: "Mediator Pattern", translation: "中介者模式", explanation: "中介者模式是一种行为设计模式，通过引入中介对象来减少多个对象间的直接耦合，促进松耦合通信。", category: "设计模式", favorite: false },
 { term: "Medium", translation: "中型", explanation: "中型通常指在软件开发或项目管理中，用于描述项目规模、团队大小或系统复杂度的中等级别分类。", category: "项目管理", favorite: false },
 { term: "Memento Pattern", translation: "备忘录模式", explanation: "备忘录模式是一种行为设计模式，允许在不破坏封装的前提下捕获并恢复对象的内部状态，用于实现撤销功能。", category: "设计模式", favorite: false },
 { term: "Merge", translation: "合并", explanation: "合并指在版本控制或数据处理中，将两个或多个分支、数据集或修改内容整合为一个统一版本的操作。", category: "开发工具", favorite: false },
 { term: "Metadata", translation: "元数据", explanation: "元数据是描述数据的数据，提供关于其他数据的属性、结构、来源或上下文信息，如文件大小、创建日期等。", category: "计算机基础", favorite: false },
 { term: "metaprogramming", translation: "元编程", explanation: "元编程是一种编程技术，允许程序在运行时动态生成或修改代码，以增强灵活性和自动化，常见于反射和模板。", category: "编程语言", favorite: false },
 { term: "Middleware", translation: "中间件", explanation: "中间件是位于操作系统和应用程序之间的软件层，用于处理通信、数据管理或服务集成，简化分布式系统开发。", category: "后端开发", favorite: false },
 { term: "mind map", translation: "思维导图、脑图、心智图", explanation: "思维导图是一种图形化工具，通过节点和分支展示想法、概念或任务间的层次和关联，用于头脑风暴和规划。", category: "项目管理", favorite: false },
 { term: "Minimum Marketable Feature", translation: "最小可售特性（MMF）", explanation: "最小可售特性（MMF）是指产品中能够独立交付给用户、并产生价值的最小功能单元，通常用于敏捷开发中优先实现核心功能。", category: "项目管理", favorite: false },
 { term: "Minimum Viable Product", translation: "最小化可行产品（MVP）", explanation: "最小化可行产品（MVP）是产品开发早期推出的具有最基本功能的版本，用于快速验证市场假设和收集用户反馈，以指导后续迭代。", category: "软件工程", favorite: false },
 { term: "Minimum Viable Release", translation: "最小可行发布（MVR）", explanation: "最小可行发布（MVR）是指将产品以最小可行形式发布到生产环境的过程，强调快速交付和持续改进，常用于敏捷和DevOps实践。", category: "软件工程", favorite: false },
 { term: "Missing Abstraction", translation: "缺失抽象", explanation: "缺失抽象是指在软件设计中未能将相关概念或行为归纳为适当的抽象类或接口，导致代码重复和难以维护，是常见的设计缺陷。", category: "设计模式", favorite: false },
 { term: "Missing Encapsulation", translation: "缺失的封装", explanation: "缺失的封装是指未将数据和行为封装在合适的类或模块中，导致外部代码可以直接访问内部细节，破坏了信息隐藏原则，增加耦合度。", category: "设计模式", favorite: false },
 { term: "Missing Hierarchy", translation: "缺失层次结构", explanation: "缺失层次结构是指在面向对象设计中未建立合理的类继承或接口层次，导致代码结构扁平化，难以扩展和复用，影响系统灵活性。", category: "设计模式", favorite: false },
 { term: "Mixed Reality", translation: "混合现实（MR）", explanation: "混合现实（MR）是一种将虚拟对象与现实世界环境融合的技术，用户可以通过设备与虚拟和现实元素进行实时交互，扩展了感知体验。", category: "其他", favorite: false },
 { term: "Mobile Service", translation: "移动服务", explanation: "移动服务是指专为移动设备（如智能手机和平板电脑）提供的网络服务或应用程序，通常涉及移动应用开发、后端支持和云集成。", category: "移动开发", favorite: false },
 { term: "Mock Object", translation: "模拟对象，仿对象：在内部对条件进行断言的伪对象", explanation: "模拟对象（Mock Object）是测试中使用的伪对象，用于模拟真实对象的行为，并在内部对条件进行断言，以隔离测试单元并验证交互。", category: "测试", favorite: false },
 { term: "Move Field", translation: "搬移字段", explanation: "搬移字段（Move Field）是一种代码重构技术，将某个字段从一个类移动到另一个更合适的类中，以改善代码结构和职责分配。", category: "软件工程", favorite: false },
 { term: "Move Method", translation: "搬移函数", explanation: "将方法从一个类移动到另一个类，以改善代码结构，使方法更接近其操作的数据。", category: "软件工程", favorite: false },
 { term: "MRD", translation: "市场需求文档（Market Requirement Document）", explanation: "描述产品市场需求、目标用户和功能需求的文档，用于指导产品开发和设计。", category: "项目管理", favorite: false },
 { term: "Multitenancy", translation: "多租户", explanation: "一种软件架构，允许多个租户共享同一应用实例，但数据相互隔离，常见于SaaS服务。", category: "软件工程", favorite: false },
 { term: "Multifaced Abstraction", translation: "多方面抽象", explanation: "一个抽象类或接口承担过多职责，导致设计复杂和难以维护，是代码坏味道的一种。", category: "软件工程", favorite: false },
 { term: "Multipath Hierarchy", translation: "多路径层次结构", explanation: "在面向对象设计中，类继承多个父类形成复杂层次结构，可能导致设计混乱和菱形继承问题。", category: "软件工程", favorite: false },
 { term: "Multitier Architecture", translation: "多层体系结构", explanation: "将应用分为多个逻辑层（如表示层、业务逻辑层、数据访问层），以提高可维护性和可扩展性。", category: "软件工程", favorite: false },
 { term: "Multi-factor Authentication", translation: "多重验证", explanation: "使用两种或以上验证因素（如密码、手机验证码、指纹）来确认用户身份，增强安全性。", category: "网络安全", favorite: false },
 { term: "naming collisions", translation: "命名冲突", explanation: "在编程中，两个或多个标识符（如变量、函数）具有相同名称，导致编译器或解释器无法区分。", category: "编程语言", favorite: false },
 { term: "Namespace", translation: "命名空间，名称空间", explanation: "用于组织代码中标识符（如类、函数）的容器，避免命名冲突，并提高代码可读性。", category: "编程语言", favorite: false },
 { term: "native code", translation: "本机代码", explanation: "直接编译为特定计算机处理器指令的代码，运行速度快，但依赖于硬件平台。", category: "计算机基础", favorite: false },
 { term: "NCC", translation: ".NET Core 社区（.NET Core Community）/.NET 中国社区（.NET China Community）", explanation: "NCC 是 .NET Core 社区或 .NET 中国社区的缩写，是一个专注于 .NET 技术交流和推广的开源社区组织。", category: "其他", favorite: false },
 { term: "Near Field Communication", translation: "近距离无线通信（NFC）", explanation: "近距离无线通信（NFC）是一种短距离高频无线通信技术，允许电子设备在几厘米内进行数据交换，常用于移动支付和门禁。", category: "硬件架构", favorite: false },
 { term: "network hops", translation: "网络跳数", explanation: "网络跳数指数据包从源到目的地经过的路由器或网络节点的数量，用于衡量网络路径的复杂性和延迟。", category: "计算机网络", favorite: false },
 { term: "NFC", translation: "近距离无线通信（Near Field Communication）", explanation: "NFC 是近距离无线通信的缩写，是一种短距离无线技术，支持设备间非接触式数据交换，如手机支付和票务。", category: "硬件架构", favorite: false },
 { term: "nfx", translation: ".NET Framework（.NET 框架）", explanation: "nfx 是 .NET Framework 的缩写，是微软开发的软件框架，用于构建和运行 Windows 应用程序，提供丰富的类库和运行时环境。", category: "编程语言", favorite: false },
 { term: "Non-clustered Index", translation: "非聚集索引", explanation: "非聚集索引是数据库中的一种索引类型，其索引顺序与数据物理存储顺序无关，通过指针指向数据行，提高查询速度但占用额外空间。", category: "数据库", favorite: false },
 { term: "non-managed code", translation: "非托管代码", explanation: "非托管代码指不由运行时环境（如 .NET CLR）自动管理内存和资源的代码，通常用 C 或 C++ 编写，需要手动管理内存。", category: "编程语言", favorite: false },
 { term: "non-optional", translation: "非可选的", explanation: "非可选的是指在编程或配置中，某个参数、属性或选项必须提供或设置，不能省略或为空，否则会导致错误。", category: "计算机基础", favorite: false },
 { term: "non-transactional pipeline", translation: "非事务型流水线", explanation: "非事务型流水线是一种数据处理架构，其中操作不保证原子性或一致性，适用于高性能场景，但可能丢失部分数据。", category: "软件工程", favorite: false },
 { term: "node", translation: "节点", explanation: "节点是网络或数据结构中的一个基本单元，可以表示计算机、路由器或数据元素，用于连接和传递信息。", category: "计算机基础", favorite: false },
 { term: "normalize", translation: "规格化", explanation: "将数据转换为标准格式，消除冗余和不一致，常用于数据库和数据处理中。", category: "数据库", favorite: false },
 { term: "notification", translation: "通知", explanation: "系统或应用向用户发送的消息或提醒，用于告知事件或更新，常见于移动设备和软件界面。", category: "前端开发", favorite: false },
 { term: "notification hub", translation: "通知中心", explanation: "集中管理和发送通知的服务或组件，支持跨平台推送，常用于移动应用和云服务中。", category: "移动开发", favorite: false },
 { term: "Null Object Pattern", translation: "空对象模式", explanation: "设计模式的一种，用空对象代替null值，避免空指针异常，提高代码健壮性和可读性。", category: "设计模式", favorite: false },
 { term: "null-coalescing", translation: "空值合并", explanation: "处理空值的操作，当变量为null时返回默认值，简化代码逻辑，常见于编程语言中。", category: "编程语言", favorite: false },
 { term: "Null coalescing operator", translation: "空值合并运算符、空值结合运算符", explanation: "编程语言中的运算符（如??），用于空值合并，快速检查null并返回非空值或默认值。", category: "编程语言", favorite: false },
 { term: "N-Tier", translation: "N 层（结构）", explanation: "软件架构模式，将应用分为多个逻辑层（如表示层、业务层、数据层），提高可维护性和扩展性。", category: "软件工程", favorite: false },
 { term: "obfuscator", translation: "混淆器", explanation: "工具或程序，用于将代码转换为难以阅读但功能相同的版本，保护知识产权和防止逆向工程。", category: "开发工具", favorite: false },
 { term: "Object Pool", translation: "对象池", explanation: "管理对象复用的技术，预先创建并缓存对象池，减少频繁创建和销毁对象的开销，提升性能。", category: "软件工程", favorite: false },
 { term: "Object Pool Pattern", translation: "对象池模式", explanation: "设计模式的一种，通过对象池重用对象，优化资源管理，常用于游戏开发和高性能应用中。", category: "设计模式", favorite: false },
 { term: "Object/Relational Mapper", translation: "对象/关系映射器（ORM，O/RM）", explanation: "一种编程技术，用于在面向对象编程语言和关系数据库之间建立映射，自动将对象数据转换为数据库记录，简化数据持久化操作。", category: "软件工程", favorite: false },
 { term: "object seam", translation: "对象接缝", explanation: "在面向对象编程中，指通过多态或依赖注入等技术，在运行时替换对象依赖，以实现测试或行为变更的代码接合点。", category: "软件工程", favorite: false },
 { term: "Objectives and Key Results", translation: "目标与关键成果法（OKR）", explanation: "一种目标管理框架，通过设定明确目标（Objectives）和可量化关键成果（Key Results），帮助团队或个人聚焦并跟踪进展。", category: "项目管理", favorite: false },
 { term: "Observer Pattern", translation: "观察者模式", explanation: "一种设计模式，定义对象间的一对多依赖关系，当一个对象状态改变时，所有依赖它的对象都会自动收到通知并更新。", category: "设计模式", favorite: false },
 { term: "On-demand (media)", translation: "点播（媒体）", explanation: "一种媒体传输方式，允许用户根据需要随时选择并播放音频、视频等内容，如流媒体服务，区别于传统的广播或直播。", category: "计算机网络", favorite: false },
 { term: "Once and Only Once", translation: "一次且仅一次3(OAOO)", explanation: "软件开发原则，强调系统中每个功能或知识应只在一个地方实现，避免重复代码，以提高可维护性和一致性。", category: "软件工程", favorite: false },
 { term: "One rule, one place", translation: "一个规则，实现一次", explanation: "与“一次且仅一次”类似，指业务规则或逻辑应在代码中只实现一次，减少重复，确保修改时只需改动一处。", category: "软件工程", favorite: false },
 { term: "One-Size-Fits-All", translation: "OSFA", explanation: "指试图用单一方案解决所有问题的通用方法，在软件中常因忽略具体需求差异而导致设计僵化或效率低下。", category: "软件工程", favorite: false },
 { term: "one-time token", translation: "一次性令牌", explanation: "一种安全令牌，仅在一次认证或交易中使用后即失效，常用于双因素认证或防止重放攻击，增强系统安全性。", category: "网络安全", favorite: false },
 { term: "Onion Architecture", translation: "洋葱架构，由 Jeffrey Palermo 提出", explanation: "一种分层软件架构，核心是领域模型，外层是应用服务和基础设施，依赖指向内层，强调关注点分离和可测试性。", category: "软件工程", favorite: false },
 { term: "Open Closed Principle", translation: "开闭原则（OCP）", explanation: "开闭原则是面向对象设计原则之一，指软件实体应对扩展开放，对修改关闭，以提高系统的可维护性和稳定性。", category: "设计模式", favorite: false },
 { term: "Open System Interconnection", translation: "开放式系统互联（OSI）", explanation: "开放式系统互联是一个网络通信的参考模型，将网络通信分为七层，用于标准化不同系统间的互联和通信协议。", category: "计算机网络", favorite: false },
 { term: "Operating System", translation: "操作系统（OS）", explanation: "操作系统是管理计算机硬件与软件资源的系统软件，提供用户界面和程序运行环境，如Windows、Linux等。", category: "操作系统", favorite: false },
 { term: "Optical Character Recognition", translation: "光学字符识别（OCR）", explanation: "光学字符识别是一种技术，通过扫描将图像中的文字转换为可编辑的文本数据，常用于文档数字化和自动化处理。", category: "人工智能", favorite: false },
 { term: "Optimistic Concurrency", translation: "乐观并发控制", explanation: "乐观并发控制是一种数据库并发处理策略，假设事务冲突较少，只在提交时检查数据是否被修改，以提高性能。", category: "数据库", favorite: false },
 { term: "optimistic locking", translation: "乐观锁", explanation: "乐观锁是一种并发控制机制，在更新数据时检查版本号或时间戳，避免冲突，常用于高并发场景以减少锁开销。", category: "数据库", favorite: false },
 { term: "orchestration", translation: "编排", explanation: "编排指自动化管理和协调多个系统或服务的工作流程，例如在微服务架构中调度任务和资源以确保高效运行。", category: "软件工程", favorite: false },
 { term: "Orchestration Layer", translation: "策略编排层", explanation: "策略编排层是软件架构中的组件，负责集中管理和执行业务逻辑或服务调用策略，以提升系统的灵活性和可维护性。", category: "软件工程", favorite: false },
 { term: "Ordering Principal", translation: "良序原则", explanation: "良序原则是数学和计算机科学中的基础概念，指集合中的元素可以按某种顺序排列，常用于算法分析和证明。", category: "计算机基础", favorite: false },
 { term: "OS", translation: "操作系统（Operating System）", explanation: "操作系统是计算机的核心系统软件，负责管理硬件资源、运行应用程序，并提供用户交互界面，如macOS或Android。", category: "操作系统", favorite: false },
 { term: "OSGI", translation: "开放服务网关协议（Open Source Gateway Initiative）", explanation: "OSGI是一种面向Java的动态模块化系统规范，允许应用程序拆分为多个可独立部署和管理的模块（bundle）。", category: "软件工程", favorite: false },
 { term: "overriding", translation: "重写", explanation: "重写是面向对象编程中的概念，指子类重新定义父类中已有的方法，以提供特定实现，支持多态性。", category: "编程语言", favorite: false },
 { term: "Overview", translation: "概览", explanation: "概览是对某个主题、系统或文档的简要总结或概述，帮助快速理解核心内容和结构。", category: "计算机基础", favorite: false },
 { term: "over-post", translation: "过度提交", explanation: "过度提交是一种安全漏洞，指客户端向服务器发送了超出预期的数据字段，可能导致未授权的数据修改。", category: "网络安全", favorite: false },
 { term: "OWASP", translation: "开放式 Web 应用程序安全项目（Open Web Application Security Project）4", explanation: "OWASP是一个非营利组织，专注于提高Web应用程序的安全性，提供免费的安全工具、标准和指南。", category: "网络安全", favorite: false },
 { term: "P2P", translation: "个人对个人（Person-to-Person）", explanation: "P2P是对等网络架构，其中每个节点（peer）既可以作为客户端请求资源，也可以作为服务器提供资源，无需中央服务器。", category: "计算机网络", favorite: false },
 { term: "Paas", translation: "平台即服务（Platform As A Service）", explanation: "PaaS是云计算服务模型之一，提供商提供硬件和软件平台（如操作系统、开发工具），用户可在此上部署和管理应用程序。", category: "云计算", favorite: false },
 { term: "packet sniffing", translation: "分组嗅探", explanation: "分组嗅探是网络监控技术，通过捕获和分析网络数据包来检查流量内容，常用于故障排查或安全分析。", category: "网络安全", favorite: false },
 { term: "Page Blob", translation: "页 BLOB", explanation: "页BLOB是Azure Blob存储中的一种类型，用于存储随机访问文件（如虚拟硬盘），数据被组织为512字节的页。", category: "云计算", favorite: false },
 { term: "Parameterize Method", translation: "令函数携带参数", explanation: "令函数携带参数是一种重构技术，将函数中的字面量值替换为参数，提高代码的灵活性和可重用性。", category: "软件工程", favorite: false },
 { term: "Partial Translate", translation: "部分翻译（出自 Chrome 浏览器）", explanation: "Chrome浏览器中的一项功能，允许用户选择网页上的部分文本进行翻译，而不是翻译整个页面。", category: "前端开发", favorite: false },
 { term: "partition", translation: "分区", explanation: "在计算机中，指将存储设备（如硬盘）或数据集合划分为多个独立部分的过程，常用于磁盘管理或数据处理。", category: "计算机基础", favorite: false },
 { term: "Partition tolerance", translation: "分区容忍性", explanation: "分布式系统中的CAP定理之一，指系统在遇到网络分区（部分节点无法通信）时仍能继续运行并保持一致性或可用性。", category: "计算机基础", favorite: false },
 { term: "PascalCase", translation: "Pascal 大小写", explanation: "一种命名约定，其中每个单词的首字母大写且无空格，常用于编程中的类名或标识符命名，如“FirstName”。", category: "编程语言", favorite: false },
 { term: "pass-through", translation: "直托", explanation: "指数据或信号不经修改直接从一个系统传递到另一个系统，常用于虚拟化或网络环境中，以保持原始状态。", category: "计算机基础", favorite: false },
 { term: "passive", translation: "被动（的）", explanation: "在计算中，指组件或模式以非主动方式运行，例如被动等待事件触发，常用于网络通信或软件设计。", category: "计算机基础", favorite: false },
 { term: "pattern", translation: "模式", explanation: "在软件工程中，指可重复使用的解决方案模板，用于解决常见设计问题，如设计模式或代码模式。", category: "软件工程", favorite: false },
 { term: "Pay as You Go", translation: "即用即付", explanation: "一种云计算计费模式，用户根据实际使用的资源量（如计算时间、存储空间）付费，无需预付固定费用。", category: "云计算", favorite: false },
 { term: "PC", translation: "个人计算机（Personal Computer）", explanation: "个人计算机的缩写，指为个人使用设计的通用计算机，通常包括台式机或笔记本电脑，运行操作系统如Windows或macOS。", category: "硬件架构", favorite: false },
 { term: "peek", translation: "查看", explanation: "在编程中，指查看数据结构（如队列或栈）顶部的元素而不移除它，常用于数据访问操作。", category: "数据结构", favorite: false },
 { term: "peering rules", translation: "对等交互规则", explanation: "对等交互规则是网络中对等体之间交换路由信息时遵循的协议和策略，用于控制数据流和优化网络性能。", category: "计算机网络", favorite: false },
 { term: "Percent Encoding", translation: "百分号编码", explanation: "百分号编码是一种在URL中将特殊字符转换为%后跟两位十六进制数的编码方式，以确保数据在传输中的安全性和兼容性。", category: "计算机网络", favorite: false },
 { term: "performance", translation: "性能", explanation: "性能指计算机系统或软件在执行任务时的效率指标，如响应时间、吞吐量和资源利用率，用于评估系统优劣。", category: "计算机基础", favorite: false },
 { term: "performance counter", translation: "性能计数器", explanation: "性能计数器是操作系统或应用程序中用于实时监测和记录系统性能数据的工具，如CPU使用率或内存占用，帮助诊断问题。", category: "操作系统", favorite: false },
 { term: "performance-oriented", translation: "面向性能", explanation: "面向性能是一种设计或开发理念，强调在系统或软件中优先考虑优化速度、效率和资源使用，以提升整体表现。", category: "软件工程", favorite: false },
 { term: "Person-to-Person", translation: "个人对个人（P2P）", explanation: "个人对个人（P2P）是一种网络架构，其中设备直接相互通信和共享资源，无需中央服务器，常用于文件共享或区块链。", category: "计算机网络", favorite: false },
 { term: "Personal Computer", translation: "个人计算机（PC）", explanation: "个人计算机（PC）是一种为个人使用设计的通用计算机，通常包括台式机或笔记本电脑，用于日常办公、娱乐等任务。", category: "硬件架构", favorite: false },
 { term: "Pessimistic Concurrency", translation: "悲观并发控制", explanation: "悲观并发控制是一种数据库管理策略，假设事务间很可能冲突，因此在操作前先锁定资源，防止并发问题，确保数据一致性。", category: "数据库", favorite: false },
 { term: "pessimistic locking", translation: "悲观锁", explanation: "悲观锁是悲观并发控制的具体实现，在事务访问数据时立即加锁，阻止其他事务修改，直到当前事务完成，以避免冲突。", category: "数据库", favorite: false },
 { term: "PHAME", translation: "由 Booch 提出的对象模型的 4 个主要元素的设计规则的统称，即 Principle of Hierarchy, Abstraction, Modularization, and Encapsulation，层次结构、抽象、模块化与封装原则", explanation: "PHAME是Booch提出的对象模型设计原则，包括层次结构、抽象、模块化与封装，用于指导软件系统的结构化开发。", category: "软件工程", favorite: false },
 { term: "pinch point", translation: "汇点：影响结构图中的隘口和交通要冲，在汇点编写测试的好处就是只需针对少数几个方法编写测试，就能达到探测大量其他方法的改动的目的。", explanation: "汇点指软件结构图中的关键节点，少量方法变动会影响大量其他部分。在此编写测试可高效探测整体改动。", category: "软件工程", favorite: false },
 { term: "placeholder", translation: "占位符", explanation: "占位符是代码或界面中预留的临时标记，用于后续替换为实际内容，常见于模板和国际化文本中。", category: "编程语言", favorite: false },
 { term: "Platform as a Service", translation: "平台即服务（Paas）", explanation: "平台即服务是一种云计算模式，提供商提供硬件和软件平台，用户可在此部署和管理应用程序，无需管理底层基础设施。", category: "云计算", favorite: false },
 { term: "PMD", translation: "项目管理文档（Program Managment Document）", explanation: "项目管理文档是记录项目目标、计划、进度和资源的正式文件，用于指导和控制项目的执行过程。", category: "项目管理", favorite: false },
 { term: "point of invocation of the method", translation: "方法调用点", explanation: "方法调用点是程序中调用某个方法的具体位置，包括代码行和上下文环境，用于确定方法执行时的入口。", category: "编程语言", favorite: false },
 { term: "Point-to-Site", translation: "点到站点", explanation: "点到站点是一种网络连接方式，允许单个客户端通过安全隧道（如VPN）远程连接到私有网络，常见于远程办公场景。", category: "计算机网络", favorite: false },
 { term: "polling", translation: "轮询", explanation: "轮询是一种程序主动重复查询设备或服务状态的机制，以检查是否有新数据或事件发生，会消耗一定计算资源。", category: "计算机基础", favorite: false },
 { term: "polymorphism", translation: "多态", explanation: "多态是面向对象编程的特性，允许同一接口或方法在不同对象上有不同实现，提高代码的灵活性和可扩展性。", category: "编程语言", favorite: false },
 { term: "polyrot programming", translation: "多语言编程", explanation: "多语言编程指在单个项目中混合使用多种编程语言，以利用各自优势，如用C++处理性能关键部分，用Python编写脚本。", category: "软件工程", favorite: false },
 { term: "Poor Man’s Dependency Injection", translation: "穷人的依赖注入", explanation: "穷人的依赖注入是一种简化依赖注入的方法，不依赖复杂框架，而是通过手动传递依赖对象来降低耦合，便于测试和维护。", category: "设计模式", favorite: false },
 { term: "post-initialization", translation: "后初始化", explanation: "在对象初始化完成后执行的额外设置或配置步骤，常用于确保对象状态完全就绪。", category: "软件工程", favorite: false },
 { term: "postcondition", translation: "后置条件", explanation: "函数或方法执行后必须满足的条件，用于描述执行结果应具备的状态或属性。", category: "软件工程", favorite: false },
 { term: "PoT", translation: "程序思维（Program-to-Thoughts） ", explanation: "一种编程思维模式，强调将程序逻辑转化为清晰的思维过程，以提升代码可读性和可维护性。", category: "计算机基础", favorite: false },
 { term: "PRD", translation: "产品需求文档（Product Requirements Document）", explanation: "描述产品功能、特性和需求的正式文档，用于指导产品设计和开发过程。", category: "项目管理", favorite: false },
 { term: "pre-flight request", translation: "事先请求", explanation: "在发送实际HTTP请求（如PUT、DELETE）前，浏览器自动发送的OPTIONS请求，用于检查跨域和服务器支持的方法。", category: "计算机网络", favorite: false },
 { term: "pre-initialization", translation: "预初始化", explanation: "在对象正式初始化之前执行的准备工作，如分配资源或设置默认值。", category: "软件工程", favorite: false },
 { term: "pre-training", translation: "预训练 ", explanation: "在特定任务训练前，使用大规模数据对模型进行的基础训练，以学习通用特征表示。", category: "机器学习", favorite: false },
 { term: "Predicate Decorator", translation: "谓词修饰器", explanation: "一种设计模式，用于动态地为对象添加额外的条件判断逻辑，常见于规则引擎或过滤系统中。", category: "设计模式", favorite: false },
 { term: "precondition", translation: "前提，前置条件", explanation: "函数或方法执行前必须满足的条件，用于确保输入参数和环境状态有效。", category: "软件工程", favorite: false },
 { term: "presentation layer", translation: "表现层", explanation: "软件架构中的一层，负责处理用户界面和用户交互，将数据以可视形式呈现给用户。", category: "软件工程", favorite: false },
 { term: "Preserve Whole Object", translation: "保持对象完整", explanation: "一种重构手法，指将多个参数替换为整个对象，以减少参数数量并提高代码可读性。", category: "软件工程", favorite: false },
 { term: "primary database", translation: "主数据库", explanation: "在数据库系统中，处理主要读写操作的核心数据库，通常用于存储关键业务数据。", category: "数据库", favorite: false },
 { term: "primary storage", translation: "主存储", explanation: "计算机中直接与CPU交互的存储设备，如内存（RAM），用于临时存储正在运行的程序和数据。", category: "计算机基础", favorite: false },
 { term: "primitive obsession", translation: "基本类型偏执", explanation: "代码坏味道之一，指过度使用基本数据类型（如整数、字符串）来表示概念，而不是使用对象。", category: "软件工程", favorite: false },
 { term: "principal", translation: "主体", explanation: "在安全上下文中，指参与系统交互的实体，如用户、设备或服务，通常用于身份验证和授权。", category: "网络安全", favorite: false },
 { term: "Private Class Data Pattern", translation: "私有类数据模式", explanation: "一种设计模式，通过限制对类内部数据的直接访问，封装数据以防止意外修改，增强数据安全性。", category: "设计模式", favorite: false },
 { term: "private cloud", translation: "私有云", explanation: "云计算部署模型，云基础设施专供单一组织使用，可在本地或第三方托管，提供更高控制和安全。", category: "云计算", favorite: false },
 { term: "priority queue", translation: "优先级队列", explanation: "一种抽象数据类型，其中每个元素都有优先级，出队时按优先级顺序（如最高优先先出），常用于任务调度。", category: "数据结构", favorite: false },
 { term: "probe", translation: "探测器", explanation: "在计算机网络或系统中，指用于检测、监控或收集信息的工具或程序，如网络探测器或性能探测器。", category: "计算机网络", favorite: false },
 { term: "process", translation: "进程", explanation: "操作系统中的基本执行单元，是程序的一次运行实例，拥有独立的内存空间和资源，用于并发执行任务。", category: "操作系统", favorite: false },
 { term: "producer", translation: "生产者", explanation: "在软件架构中，生产者是负责生成数据或事件的组件，通常与消费者模式配合，将消息放入队列供其他部分处理。", category: "软件工程", favorite: false },
 { term: "product backlog", translation: "产品积压工作", explanation: "在敏捷开发中，产品积压工作是一个动态的、优先级排序的功能列表，包含了产品所有已知的需求、改进和修复任务。", category: "项目管理", favorite: false },
 { term: "Product Owner", translation: "产品负责人（PO）", explanation: "产品负责人是敏捷团队中的关键角色，负责定义产品愿景、管理产品待办列表优先级，并确保团队交付最大业务价值。", category: "项目管理", favorite: false },
 { term: "Product Requirements Document", translation: "产品需求文档（PRD）", explanation: "产品需求文档是一份详细描述产品功能、特性和约束的正式文档，用于指导开发团队理解和实现产品需求。", category: "软件工程", favorite: false },
 { term: "production", translation: "生产（环境）", explanation: "生产环境是指软件正式部署并对外提供服务的运行环境，与开发、测试环境隔离，要求高稳定性和安全性。", category: "软件工程", favorite: false },
 { term: "production load", translation: "生产负载", explanation: "生产负载指在生产环境中系统所承受的实际工作压力，包括用户访问量、数据处理量等，用于评估系统性能和容量。", category: "软件工程", favorite: false },
 { term: "Program Managment Document", translation: "项目管理文档（PMD）", explanation: "项目管理文档是记录项目目标、计划、进度和资源的综合性文件，用于协调团队工作并跟踪项目执行情况。", category: "项目管理", favorite: false },
 { term: "Program-to-Thoughts", translation: "程序思维（PoT） ", explanation: "程序思维是一种强调通过编写程序或伪代码来结构化思考和解决问题的认知方法，常用于复杂逻辑分析。", category: "计算机基础", favorite: false },
 { term: "programming by difference", translation: "差异式编程", explanation: "差异式编程是一种通过继承现有类并只修改或扩展部分功能来实现新功能的面向对象编程技术，旨在减少重复代码。", category: "编程语言", favorite: false },
 { term: "proof of concept", translation: "概念验证", explanation: "概念验证是通过构建一个简单的原型或实验来验证某项技术、方法或想法在实践中的可行性和潜在价值。", category: "软件工程", favorite: false },
 { term: "proportional error rate", translation: "错误率比例", explanation: "错误率比例是衡量模型预测错误程度的指标，通常指错误预测数量与总预测数量的比值，用于评估模型性能。", category: "机器学习", favorite: false },
 { term: "protected variation", translation: "防止变异", explanation: "防止变异是一种设计原则，旨在通过封装变化点来保护系统核心部分免受外部变化影响，提高代码的稳定性和可维护性。", category: "软件工程", favorite: false },
 { term: "protocol", translation: "协议", explanation: "协议是计算机网络中通信双方共同遵守的规则和标准，用于定义数据格式、传输方式和错误处理，确保设备间有效交互。", category: "计算机网络", favorite: false },
 { term: "prototype", translation: "原型", explanation: "原型是软件开发早期创建的初步模型，用于展示功能、界面或流程，帮助团队和用户验证设计思路，减少开发风险。", category: "软件工程", favorite: false },
 { term: "Prototype Pattern", translation: "原型模式", explanation: "原型模式是一种创建型设计模式，通过复制现有对象来创建新对象，避免重复初始化，提高性能并简化对象创建过程。", category: "设计模式", favorite: false },
 { term: "proxy", translation: "代理", explanation: "代理是计算机网络或软件中的中间实体，代表用户或系统执行任务，如转发请求、缓存数据或提供安全控制，以增强功能。", category: "计算机网络", favorite: false },
 { term: "Proxy Pattern", translation: "代理模式", explanation: "代理模式是一种结构型设计模式，通过引入代理对象来控制对原始对象的访问，常用于实现延迟加载、权限控制或日志记录。", category: "设计模式", favorite: false },
 { term: "public cloud", translation: "公有云", explanation: "公有云是由第三方提供商通过互联网向公众提供的云计算服务，用户按需付费使用资源，如存储、计算和应用程序。", category: "云计算", favorite: false },
 { term: "Pull Up Constructor Body", translation: "构造函数本体上移", explanation: "构造函数本体上移是重构技术，将子类构造函数中的共同代码移动到父类构造函数中，以减少代码重复并提高可维护性。", category: "软件工程", favorite: false },
 { term: "Pull Up Field", translation: "字段上移", explanation: "字段上移是重构技术，将多个子类中相同的字段移动到父类中，以消除冗余并促进代码重用，使继承结构更清晰。", category: "软件工程", favorite: false },
 { term: "Pull Up Method", translation: "函数上移", explanation: "一种重构技术，将子类中相同的方法移动到父类中，以减少代码重复，提高代码复用性。", category: "软件工程", favorite: false },
 { term: "push", translation: "推送", explanation: "在版本控制中，将本地代码更改上传到远程仓库的操作，以便与他人共享或备份代码。", category: "开发工具", favorite: false },
 { term: "Push Down Field", translation: "字段下移", explanation: "一种重构技术，将父类中仅被部分子类使用的字段移动到相关子类中，以消除不必要的继承依赖。", category: "软件工程", favorite: false },
 { term: "Push Down Method", translation: "函数下移", explanation: "一种重构技术，将父类中仅被部分子类使用的方法移动到相关子类中，以优化类层次结构。", category: "软件工程", favorite: false },
 { term: "quality assurance", translation: "质量保证（QA）", explanation: "确保软件产品符合质量标准和用户需求的过程，包括测试、审查等活动，以预防缺陷。", category: "软件工程", favorite: false },
 { term: "Queue", translation: "队列", explanation: "一种先进先出（FIFO）的线性数据结构，元素从一端添加，从另一端移除，常用于任务调度。", category: "数据结构", favorite: false },
 { term: "Quota", translation: "配额", explanation: "对资源使用量的限制，如存储空间、网络带宽或API调用次数，用于管理和公平分配资源。", category: "云计算", favorite: false },
 { term: "Rack", translation: "机架", explanation: "用于安装和堆叠服务器、网络设备等硬件单元的框架，通常部署在数据中心，便于管理和维护。", category: "硬件架构", favorite: false },
 { term: "RAII", translation: "Resource Acquisition Is Initialization，资源获取即初始化", explanation: "一种C++编程惯用法，通过对象的生命周期管理资源（如内存、文件），确保资源自动释放，避免泄漏。", category: "编程语言", favorite: false },
 { term: "Rapid Application Development", translation: "快速应用程序开发（RAD）", explanation: "一种软件开发方法论，强调快速原型和迭代开发，使用可视化工具加速应用构建，减少传统开发周期。", category: "软件工程", favorite: false },
 { term: "RDBMS", translation: "关系型数据库管理系统（Relational Database Management System）", explanation: "关系型数据库管理系统，用于管理基于关系模型的数据，支持SQL查询，常见的有MySQL、Oracle等。", category: "数据库", favorite: false },
 { term: "Reactive extensions", translation: "响应式扩展（Rx）", explanation: "响应式扩展，是一种编程范式，用于处理异步数据流，常见于事件驱动和实时应用开发中。", category: "编程语言", favorite: false },
 { term: "Ready (status)", translation: "就绪（状态）", explanation: "就绪状态，指进程或资源已准备就绪，可以立即执行或使用，常见于操作系统和并发编程。", category: "操作系统", favorite: false },
 { term: "real-time", translation: "即时、实时", explanation: "即时或实时，指系统或应用能够立即响应事件或处理数据，无显著延迟，常见于实时计算和通信。", category: "计算机基础", favorite: false },
 { term: "real-time discussions", translation: "即时讨论、实时讨论", explanation: "即时讨论或实时讨论，指在线协作工具中支持用户实时交流的功能，常用于团队协作和项目管理。", category: "软件工程", favorite: false },
 { term: "Rebellious Hierarchy", translation: "叛逆性层次结构", explanation: "叛逆性层次结构，是一种设计模式，用于处理对象间复杂关系，允许灵活的结构变化，较少常见。", category: "设计模式", favorite: false },
 { term: "recursion", translation: "递归", explanation: "递归，是一种编程技术，函数直接或间接调用自身来解决问题，常见于算法和数据结构中。", category: "算法", favorite: false },
 { term: "Redundancy", translation: "冗余", explanation: "冗余，指在系统中重复配置组件或数据，以提高可靠性和容错能力，常见于存储和网络设计。", category: "计算机基础", favorite: false },
 { term: "Redundant", translation: "冗余（的）", explanation: "冗余的，形容词形式，描述具有重复备份特性的系统或组件，用于增强稳定性和可用性。", category: "计算机基础", favorite: false },
 { term: "Ref Return", translation: "应用返回", explanation: "应用返回，是C#等编程语言中的特性，允许方法返回引用类型，直接修改原始数据，提高性能。", category: "编程语言", favorite: false },
 { term: "Ref Local", translation: "局部引用", explanation: "Ref Local是C#中的一种变量类型，允许方法返回对局部变量的引用，通常用于提高性能或实现特定模式。", category: "编程语言", favorite: false },
 { term: "Ref Property", translation: "引用属性", explanation: "Ref Property是C#中的属性，允许通过引用访问或修改对象的数据成员，常用于优化或直接操作数据。", category: "编程语言", favorite: false },
 { term: "Ref-Safe-to-Escape", translation: "引用安全逃逸", explanation: "Ref-Safe-to-Escape是C#编译器中的安全分析机制，用于确保引用不会逃逸出其安全范围，防止内存错误。", category: "编程语言", favorite: false },
 { term: "Ref-Safe-to-Escape scope", translation: "引用安全逃逸范围", explanation: "Ref-Safe-to-Escape scope定义了引用在C#中可以被安全使用的代码区域，确保引用不会在无效上下文中被访问。", category: "编程语言", favorite: false },
 { term: "Refactor", translation: "重构", explanation: "Refactor指在不改变软件外部行为的前提下，改进代码的内部结构，以提高可读性、可维护性或性能。", category: "软件工程", favorite: false },
 { term: "region", translation: "地域", explanation: "region在云计算中通常指数据中心的地理位置或逻辑分区，用于部署资源以提高可用性或合规性。", category: "云计算", favorite: false },
 { term: "reification", translation: "具体化", explanation: "reification是将抽象概念（如类型或算法）转化为具体实现的过程，常见于编程语言和软件设计中。", category: "计算机基础", favorite: false },
 { term: "Reinforcement Learning", translation: "强化学习", explanation: "Reinforcement Learning是一种机器学习方法，智能体通过与环境交互并基于奖励信号学习最优行为策略。", category: "机器学习", favorite: false },
 { term: "Reinforcement Learning from Human Feedback", translation: "基于人工反馈的强化学习（RLHF）", explanation: "Reinforcement Learning from Human Feedback（RLHF）是一种强化学习技术，利用人类反馈来训练模型，以对齐人类价值观。", category: "人工智能", favorite: false },
 { term: "relay", translation: "中继", explanation: "relay在计算机网络中是一种设备或协议，用于转发数据包或信号，以扩展网络覆盖范围或提高传输效率。", category: "计算机网络", favorite: false },
 { term: "Relevancy", translation: "适切性", explanation: "在信息检索和搜索系统中，指查询结果与用户需求的相关程度，是衡量搜索质量的重要指标。", category: "计算机基础", favorite: false },
 { term: "Reliability", translation: "可靠性", explanation: "系统或组件在规定条件下和时间内，持续正常执行其规定功能的能力，是系统质量的关键属性。", category: "软件工程", favorite: false },
 { term: "Relying Party", translation: "依赖方", explanation: "在安全协议或身份认证中，指依赖来自另一方的断言或凭证来做出授权决策的一方，如服务提供者。", category: "网络安全", favorite: false },
 { term: "Remove Assignments to Parameters", translation: "移除对参数的赋值", explanation: "一种代码重构方法，通过将传入参数赋值给局部变量来避免修改参数值，提高代码可读性和可维护性。", category: "软件工程", favorite: false },
 { term: "Remove Control Flag", translation: "移除控制标记", explanation: "一种代码重构技术，通过使用break、return等语句替代控制标记变量，简化循环或条件逻辑的流程。", category: "软件工程", favorite: false },
 { term: "Remove Middle Man", translation: "移除中间人", explanation: "一种代码重构方法，当某个类过度委托简单操作时，直接调用底层对象，减少不必要的间接层，简化设计。", category: "设计模式", favorite: false },
 { term: "Remove Parameter", translation: "移除参数", explanation: "一种代码重构技术，当函数参数不再被使用时，移除该参数以简化函数签名，保持接口清晰。", category: "软件工程", favorite: false },
 { term: "Remove Setting Method", translation: "移除配置函数", explanation: "一种代码重构方法，当某个字段应在对象创建时设值且后续不应更改时，移除其设置函数，确保字段不可变。", category: "软件工程", favorite: false },
 { term: "Rename Method", translation: "函数改名", explanation: "一种代码重构技术，通过修改函数名称以更清晰地表达其意图或功能，提升代码的可读性和可维护性。", category: "软件工程", favorite: false },
 { term: "Replace Array with Object", translation: "以对象取代数组", explanation: "一种代码重构方法，当数组元素代表不同概念时，用对象替换数组，使每个元素有明确的字段名，提高可读性。", category: "软件工程", favorite: false },
 { term: "Replace Conditional with Polymorphism", translation: "以多态取代条件表达式", explanation: "通过创建子类并重写方法，用多态处理不同条件分支，减少复杂的条件判断，提高代码可扩展性。", category: "设计模式", favorite: false },
 { term: "Replace Constructor with Factory Method", translation: "以工厂函数取代构造函数", explanation: "将构造函数替换为工厂方法，封装对象创建逻辑，提供更灵活的对象实例化方式，便于管理对象生命周期。", category: "设计模式", favorite: false },
 { term: "Replace Data Value with Object", translation: "以对象取代数据值", explanation: "将简单的数据值封装为对象，增加相关行为和属性，提高代码的可读性和可维护性，避免数据散落。", category: "设计模式", favorite: false },
 { term: "Replace Delegation with Inheritance", translation: "以继承取代委托", explanation: "当委托关系过于紧密时，改用继承来简化代码结构，使子类直接获得父类的功能，减少冗余委托调用。", category: "设计模式", favorite: false },
 { term: "Replace Error 　 Code with Exception", translation: "以异常取代错误码", explanation: "用异常处理机制替代返回错误码的方式，使错误处理更清晰、集中，提升代码的可读性和健壮性。", category: "设计模式", favorite: false },
 { term: "Replace Exception with Test", translation: "以测试取代异常", explanation: "在可能引发异常的操作前添加条件测试，避免不必要的异常抛出，提高代码效率和可预测性。", category: "设计模式", favorite: false },
 { term: "Replace Inheritance with Delegation", translation: "以委托取代继承", explanation: "当继承导致类之间耦合过高时，改用委托关系，通过组合对象来实现功能，提高代码的灵活性和复用性。", category: "设计模式", favorite: false },
 { term: "Replace Magic Number with Symbolic Constant", translation: "以字面常量取代魔法数", explanation: "将代码中的硬编码数字（魔法数）替换为有意义的常量，提高代码可读性和可维护性，便于统一修改。", category: "设计模式", favorite: false },
 { term: "Replace Method with Method Object", translation: "以函数对象取代函数", explanation: "将复杂的方法提取为独立的对象，封装其状态和行为，使方法逻辑更清晰，便于测试和重构。", category: "设计模式", favorite: false },
 { term: "Replace Nested Conditional with Guard Clauses", translation: "以卫语句取代嵌套条件表达式", explanation: "用卫语句（提前返回的条件检查）替代嵌套的条件表达式，简化代码结构，提高可读性和可维护性。", category: "设计模式", favorite: false },
 { term: "Replace Parameter with Explicit Methods", translation: "以明确函数取代参数", explanation: "一种重构手法，将根据参数值执行不同行为的函数拆分为多个独立的明确函数，提高代码可读性。", category: "设计模式", favorite: false },
 { term: "Replace Parameter with Methods", translation: "以函数取代参数", explanation: "一种重构手法，当参数可以通过调用已有函数获得时，直接调用函数代替传递参数，简化参数列表。", category: "设计模式", favorite: false },
 { term: "Replace Record with Data Class", translation: "以数据类取代记录", explanation: "一种重构手法，将记录式数据结构（如结构体）转换为具有数据字段和简单行为的数据类，提升面向对象特性。", category: "设计模式", favorite: false },
 { term: "Replace Subclass with Fields", translation: "以字段取代子类", explanation: "一种重构手法，当子类仅用于返回常量数据时，直接使用字段代替子类，简化继承结构。", category: "设计模式", favorite: false },
 { term: "Replace Temp with Query", translation: "以查询取代临时变量", explanation: "一种重构手法，将临时变量替换为查询函数，避免重复计算，提高代码复用性和可维护性。", category: "设计模式", favorite: false },
 { term: "Replace Type Code with Class", translation: "以类取代类型码", explanation: "一种重构手法，将表示类型的数字或字符串代码替换为专门的类，增强类型安全性和可扩展性。", category: "设计模式", favorite: false },
 { term: "Replace Type Code with State/Strategy", translation: "以 State/Strategy 取代类型码", explanation: "一种重构手法，将类型码相关的行为封装到独立的 State 或 Strategy 对象中，实现行为动态变化。", category: "设计模式", favorite: false },
 { term: "Replace Type Code with Subclass", translation: "以子类取代类型码", explanation: "一种重构手法，根据类型码创建不同的子类，将类型相关的行为分布到子类中，利用多态简化逻辑。", category: "设计模式", favorite: false },
 { term: "reporting", translation: "报表", explanation: "指生成和展示数据汇总、分析结果的过程或系统，常用于业务决策支持，如财务报表、统计图表等。", category: "软件工程", favorite: false },
 { term: "Repository", translation: "存储库；仓储；仓库；资源库", explanation: "在软件架构中，指封装数据访问逻辑的层，为领域模型提供集合式接口，隔离业务逻辑与数据存储细节。", category: "设计模式", favorite: false },
 { term: "REpresentational State Transfer", translation: "表述性状态转移、表征性状态传输、具象状态传输（REST）", explanation: "一种软件架构风格，强调使用无状态通信和标准HTTP方法（如GET、POST）来操作资源，常用于Web API设计。", category: "软件工程", favorite: false },
 { term: "request pipeline", translation: "请求管道", explanation: "指请求在服务器端处理过程中经过的一系列中间件或处理步骤，用于执行如认证、日志记录等任务。", category: "后端开发", favorite: false },
 { term: "Requirements Churn", translation: "需求波动", explanation: "在软件开发过程中，需求频繁变更或增加的现象，可能导致项目延期和成本上升。", category: "软件工程", favorite: false },
 { term: "reserved", translation: "专属", explanation: "指某个资源或标识符被特定实体占用或保留，以防止其他实体使用，常见于网络或系统资源分配。", category: "计算机基础", favorite: false },
 { term: "resolution", translation: "解析", explanation: "指将问题或数据分解并找到解决方案的过程，如图像分辨率指像素密度，域名解析指将域名转换为IP地址。", category: "计算机基础", favorite: false },
 { term: "Resource Acquisition Is Initialization", translation: "资源获取即初始化（RAII）", explanation: "一种编程技术，将资源（如内存、文件）的生命周期与对象绑定，在对象构造时获取资源，析构时自动释放。", category: "编程语言", favorite: false },
 { term: "Resource Release Is Destruction", translation: "在构造时没有“获取”资源，但在析构时释放资源（RRID），一种 RAII 的特殊用法", explanation: "RAII的一种变体，对象在构造时不获取资源，但在析构时负责释放已分配的资源，用于资源清理。", category: "编程语言", favorite: false },
 { term: "Resource-Oriented Architecture", translation: "面向资源的架构(ROA)", explanation: "一种架构设计方法，将系统建模为一组资源，每个资源可通过唯一标识符访问，常用于RESTful系统。", category: "软件工程", favorite: false },
 { term: "Response Group", translation: "响应群", explanation: "指一组协同工作的组件或服务，共同处理并响应某个请求，常用于分布式系统或负载均衡场景。", category: "后端开发", favorite: false },
 { term: "Return on Investment", translation: "投资回报（ROI）", explanation: "衡量投资效益的指标，计算为收益与成本之比，用于评估项目或技术的经济可行性。", category: "项目管理", favorite: false },
 { term: "reverse proxy module", translation: "反向代理模块", explanation: "反向代理模块是一种服务器组件，用于接收客户端请求并转发给后端服务器，同时隐藏后端服务器的真实地址，常用于负载均衡和安全防护。", category: "计算机网络", favorite: false },
 { term: "retail", translation: "零售版", explanation: "零售版指软件或硬件产品面向普通消费者销售的版本，通常包含完整功能和支持，与测试版或企业版相对。", category: "软件工程", favorite: false },
 { term: "Rich Client", translation: "丰富客户端", explanation: "丰富客户端是一种客户端应用程序，具有强大的本地处理能力和用户界面，能独立运行或与服务器交互，提供更流畅的用户体验。", category: "前端开发", favorite: false },
 { term: "Ripple Effect", translation: "涟漪效应", explanation: "涟漪效应指在用户界面中，当用户点击或触摸元素时产生的视觉反馈效果，如水波扩散，用于增强交互感知。", category: "前端开发", favorite: false },
 { term: "RLHF", translation: "基于人工反馈的强化学习（Reinforcement Learning from Human Feedback）", explanation: "RLHF是一种机器学习方法，通过人类反馈来训练强化学习模型，使模型行为更符合人类偏好，常用于AI对齐和优化。", category: "人工智能", favorite: false },
 { term: "role", translation: "角色", explanation: "角色在计算机系统中指用户或实体被分配的权限和职责集合，用于访问控制和权限管理，如管理员或普通用户。", category: "计算机基础", favorite: false },
 { term: "Rolling Upgrade", translation: "滚动升级", explanation: "滚动升级是一种软件更新策略，逐步更新系统实例而不中断服务，确保高可用性，常用于分布式系统。", category: "软件工程", favorite: false },
 { term: "round-robin", translation: "轮流（分配）；轮叫", explanation: "轮叫是一种调度算法，将任务或请求按顺序分配给一组资源，如服务器，以实现简单的负载均衡。", category: "算法", favorite: false },
 { term: "round-tripping", translation: "还原；回传；往返，往返切换", explanation: "还原或往返指数据在不同格式或系统间转换后能无损恢复原状的过程，常用于数据交换和兼容性测试。", category: "计算机基础", favorite: false },
 { term: "router", translation: "路由器", explanation: "路由器是网络设备，用于在不同网络间转发数据包，基于IP地址决定最佳路径，实现网络互联和通信。", category: "计算机网络", favorite: false },
 { term: "row", translation: "行", explanation: "在数据库或表格中，行是水平排列的一组数据，代表一条完整记录，包含多个字段的值。", category: "数据库", favorite: false },
 { term: "RPC", translation: "远程过程调用（Remote Procedure Call）", explanation: "RPC是一种网络通信协议，允许程序调用远程服务器上的函数或过程，就像调用本地函数一样，简化分布式系统开发。", category: "计算机网络", favorite: false },
 { term: "RRID", translation: "Resource Release Is Destruction，在构造时没有“获取”资源，但在析构时释放资源，一种 RAII 的特殊用法", explanation: "RRID是RAII（资源获取即初始化）的一种特殊用法，在对象构造时不获取资源，但在析构时释放资源，用于管理资源生命周期。", category: "编程语言", favorite: false },
 { term: "Saas", translation: "软件即服务（Software As A Service）", explanation: "SaaS是一种云计算服务模式，用户通过互联网访问和使用软件应用，而无需本地安装和维护，如在线办公套件。", category: "云计算", favorite: false },
 { term: "Safe-to-Escape", translation: "安全逃逸", explanation: "安全逃逸指在编程中，数据或资源从安全上下文（如受保护区域）传递到不安全上下文时，可能引发安全风险的情况。", category: "编程语言", favorite: false },
 { term: "Safe-to-Escape scope", translation: "安全逃逸范围", explanation: "安全逃逸范围定义了数据或资源在程序中可以被安全传递和使用的区域，超出此范围可能导致安全漏洞，如内存错误。", category: "编程语言", favorite: false },
 { term: "salted password hashing", translation: "加盐密码哈希", explanation: "加盐密码哈希是一种密码存储技术，在哈希密码前添加随机字符串（盐），以增强安全性，防止彩虹表攻击。", category: "网络安全", favorite: false },
 { term: "SAN", translation: "存储区域网络（Storage Area Network）", explanation: "SAN是一种高速专用网络，连接服务器和存储设备（如磁盘阵列），提供块级数据访问，用于集中存储管理。", category: "硬件架构", favorite: false },
 { term: "SASL", translation: "简单认证与安全层", explanation: "SASL是一种网络协议框架，为连接协议添加认证支持，允许使用多种认证机制（如Kerberos）来确保通信安全。", category: "计算机网络", favorite: false },
 { term: "Scalability", translation: "缩放性", explanation: "缩放性指系统处理增长负载的能力，包括水平缩放（增加更多节点）和垂直缩放（升级单个节点资源），以保持性能。", category: "软件工程", favorite: false },
 { term: "Scalable Vector Graphic", translation: "可伸缩矢量图（SVG）", explanation: "一种基于XML的矢量图形格式，可在不失真的情况下任意缩放，常用于网页图标和图表。", category: "前端开发", favorite: false },
 { term: "Scale", translation: "缩放", explanation: "指调整系统、图像或数据的尺寸或容量，以适应不同需求或负载变化的过程。", category: "计算机基础", favorite: false },
 { term: "Scale Out", translation: "向外缩放", explanation: "通过增加更多节点或服务器来扩展系统处理能力，常用于分布式系统以提升性能和容量。", category: "云计算", favorite: false },
 { term: "Scale Up", translation: "向上缩放", explanation: "通过升级单个节点的硬件资源（如CPU、内存）来提升系统性能，适用于垂直扩展场景。", category: "硬件架构", favorite: false },
 { term: "scaling pattern", translation: "扩展模式", explanation: "描述系统扩展时采用的设计方法或策略，如水平扩展或垂直扩展，以确保可伸缩性。", category: "软件工程", favorite: false },
 { term: "Schema (database)", translation: "架构（数据）", explanation: "数据库中的结构定义，描述数据如何组织、存储和关联，包括表、字段和约束等。", category: "数据库", favorite: false },
 { term: "Schema (xml)", translation: "架构（xml）", explanation: "XML文档的结构定义，用于验证XML数据的格式和内容，确保其符合特定规范。", category: "计算机基础", favorite: false },
 { term: "Scrum Master", translation: "Scrum 主管（SM）", explanation: "Scrum团队中的角色，负责确保团队遵循Scrum流程，移除障碍并促进高效协作。", category: "项目管理", favorite: false },
 { term: "SDK", translation: "软件开发工具箱（Software Development Kits）", explanation: "一套工具和库的集合，帮助开发者创建特定平台或服务的应用程序，简化开发过程。", category: "开发工具", favorite: false },
 { term: "seam", translation: "接缝", explanation: "软件中可替换或修改的边界点，便于在不影响其他部分的情况下进行测试或调整。", category: "软件工程", favorite: false },
 { term: "Search Engine", translation: "搜索引擎（SE）", explanation: "搜索引擎是一种通过爬取、索引和排序网页信息，帮助用户快速查找互联网内容的系统，如Google、百度。", category: "计算机网络", favorite: false },
 { term: "Search Engine Marketing", translation: "搜索引擎营销（SEM）", explanation: "搜索引擎营销是一种通过付费广告在搜索引擎结果页中推广网站或产品，以提高可见性和流量的营销策略。", category: "其他", favorite: false },
 { term: "Search Engine Optimization", translation: "搜索引擎优化（SEO）", explanation: "搜索引擎优化是通过优化网站内容和结构，提高其在搜索引擎自然结果中的排名，从而吸引更多免费流量的技术。", category: "其他", favorite: false },
 { term: "secondary storage", translation: "二级存储", explanation: "二级存储是计算机中用于长期存储数据的非易失性存储设备，如硬盘、SSD，比内存容量大但速度较慢。", category: "硬件架构", favorite: false },
 { term: "Secure Socket Layer", translation: "安全套接层（SSL）", explanation: "安全套接层是一种用于在网络上加密数据传输的协议，确保通信安全，常用于网站HTTPS连接中。", category: "网络安全", favorite: false },
 { term: "Security", translation: "安全（性）", explanation: "安全性指保护计算机系统、网络和数据免受未经授权的访问、攻击或损坏的措施和属性。", category: "网络安全", favorite: false },
 { term: "Security Development Lifecycle", translation: "安全开发生命周期", explanation: "安全开发生命周期是一种在软件开发过程中集成安全实践的方法论，旨在从设计阶段就预防安全漏洞。", category: "软件工程", favorite: false },
 { term: "Security Socket Layer", translation: "安全套接层", explanation: "安全套接层是一种加密协议，用于在网络通信中提供隐私和数据完整性，是TLS协议的前身。", category: "网络安全", favorite: false },
 { term: "Security Token", translation: "安全令牌", explanation: "安全令牌是一种物理或数字设备，用于验证用户身份，通常通过生成一次性密码来增强登录安全性。", category: "网络安全", favorite: false },
 { term: "Self Encapsulate Field", translation: "自封装字段", explanation: "自封装字段是一种设计模式，通过将类的字段设为私有并提供公共访问方法，以控制对字段的访问和修改。", category: "设计模式", favorite: false },
 { term: "self-hosted", translation: "自管理主机", explanation: "指软件或服务部署在用户自己的服务器或基础设施上，而非依赖第三方云服务，用户拥有完全的控制权。", category: "软件工程", favorite: false },
 { term: "Self-signed Certificate", translation: "自签名证书", explanation: "一种由创建者自己签发而非受信任的证书颁发机构签发的数字证书，通常用于测试或内部环境，浏览器会提示不安全。", category: "网络安全", favorite: false },
 { term: "Semantic Kernel", translation: "语义核心 ", explanation: "微软推出的一个开源框架，用于将大型语言模型的能力集成到应用程序中，实现自然语言处理和AI驱动的功能。", category: "人工智能", favorite: false },
 { term: "semantic monitoring", translation: "语义监控", explanation: "一种监控方法，不仅检查系统指标是否正常，还关注业务逻辑或语义层面的正确性，确保系统行为符合预期。", category: "软件工程", favorite: false },
 { term: "Semantic Versioning", translation: "语义化版本控制", explanation: "一种版本号命名规范，格式为MAJOR.MINOR.PATCH，分别表示不兼容的改动、新增功能且向下兼容、修复bug且向下兼容。", category: "软件工程", favorite: false },
 { term: "Separate Domain from Presentation", translation: "将领域和表述/显示分离", explanation: "一种软件设计原则，将核心业务逻辑（领域层）与用户界面或展示层分离，以提高代码的可维护性和可测试性。", category: "设计模式", favorite: false },
 { term: "Separate Query from Modifier", translation: "将查询函数和修改函数分离", explanation: "一种编程原则，建议将查询数据（只读操作）和修改数据（写操作）的函数分开，避免副作用，提高代码清晰度。", category: "设计模式", favorite: false },
 { term: "Serializable", translation: "可序列化", explanation: "指对象可以转换为字节序列（如存储或传输），并在需要时恢复为原始对象，常用于数据持久化或网络通信。", category: "编程语言", favorite: false },
 { term: "Server Affinity", translation: "服务器绑定", explanation: "在负载均衡中，确保同一用户的请求始终被路由到同一台服务器，以维持会话状态或缓存一致性。", category: "计算机网络", favorite: false },
 { term: "Server Driven Content Negotiation", translation: "服务器驱动的内容协商", explanation: "HTTP内容协商的一种方式，由服务器根据请求头（如Accept）自动选择最合适的资源表示（如JSON或XML）返回给客户端。", category: "计算机网络", favorite: false },
 { term: "Server Side Render", translation: "服务器渲染（SSR）", explanation: "服务器渲染（SSR）是一种前端开发技术，指在服务器端生成完整的HTML页面，然后发送给浏览器，以提高首屏加载速度和SEO效果。", category: "前端开发", favorite: false },
 { term: "Service Bus", translation: "服务总线", explanation: "服务总线是一种软件架构模式，用于在分布式系统中连接不同服务，实现消息传递、路由和集成，常用于微服务架构。", category: "软件工程", favorite: false },
 { term: "Service Contract", translation: "服务合同", explanation: "服务合同是定义服务接口的规范，包括操作、参数、返回值等，用于确保服务提供方和消费方之间的通信一致性。", category: "软件工程", favorite: false },
 { term: "Service Level Agreement", translation: "服务水平协议（SLA）", explanation: "服务水平协议（SLA）是服务提供方与客户之间的正式协议，明确服务性能指标（如可用性、响应时间）和违约责任。", category: "项目管理", favorite: false },
 { term: "Service Provider", translation: "服务提供方", explanation: "服务提供方是指提供特定服务（如云计算、API等）的实体或组织，负责维护和交付服务以满足客户需求。", category: "云计算", favorite: false },
 { term: "session jacking", translation: "会话劫持", explanation: "会话劫持是一种网络安全攻击，攻击者窃取或劫持用户的会话标识（如Cookie），以冒充用户身份访问受保护资源。", category: "网络安全", favorite: false },
 { term: "Setting", translation: "设置", explanation: "设置指软件或系统中可配置的参数或选项，允许用户根据需求调整功能、界面或行为，以个性化使用体验。", category: "计算机基础", favorite: false },
 { term: "Shared", translation: "共享；分享", explanation: "共享指资源（如文件、数据、设备）在多个用户或进程之间共同使用，以提高效率和协作，常见于网络和操作系统环境。", category: "计算机基础", favorite: false },
 { term: "shared-memory data structure", translation: "共享内存数据结构", explanation: "共享内存数据结构是一种允许多个进程或线程通过共享内存区域访问和操作的数据结构，用于高效并发编程。", category: "数据结构", favorite: false },
 { term: "Short-circuit evaluation", translation: "短路求值", explanation: "短路求值是一种编程语言优化技术，在逻辑表达式（如AND、OR）中，如果结果已能确定，则跳过后续计算，提高效率。", category: "编程语言", favorite: false },
 { term: "Sign in", translation: "登录", explanation: "用户通过提供凭证（如用户名和密码）来验证身份，从而获得系统访问权限的过程。", category: "计算机基础", favorite: false },
 { term: "Sign out", translation: "注销", explanation: "用户结束当前会话，退出系统或应用，通常用于安全地终止访问权限。", category: "计算机基础", favorite: false },
 { term: "Signature", translation: "签名", explanation: "用于验证数据来源和完整性的数字标识，常见于加密、认证和代码签名中。", category: "网络安全", favorite: false },
 { term: "Single Level of Abstraction Principle", translation: "单一抽象层次原则（SLAP）", explanation: "软件设计原则，要求一个函数或方法内的代码应处于同一抽象层次，以提高可读性。", category: "软件工程", favorite: false },
 { term: "Single responsibility principle", translation: "单一职责原则（SRP）", explanation: "面向对象设计原则，指一个类应该只有一个引起变化的原因，即只负责一项功能。", category: "设计模式", favorite: false },
 { term: "Single Page Application", translation: "单页面应用（SPA）", explanation: "一种Web应用，通过动态加载内容在单个页面中提供完整用户体验，无需重新加载整个页面。", category: "前端开发", favorite: false },
 { term: "single point of failure", translation: "单一故障点（SPOF）", explanation: "系统中一旦失效就会导致整个系统停止工作的组件，是可靠性和容错设计中的关键风险点。", category: "硬件架构", favorite: false },
 { term: "Singleton Pattern", translation: "单例模式", explanation: "一种创建型设计模式，确保一个类只有一个实例，并提供全局访问点，常用于资源管理。", category: "设计模式", favorite: false },
 { term: "Site", translation: "站点", explanation: "指一个可通过网络访问的特定位置或集合，如网站、服务器群组或物理位置。", category: "计算机网络", favorite: false },
 { term: "Site-to-Site", translation: "站点到站点", explanation: "一种网络连接方式，用于在不同地理位置的两个或多个网络之间建立安全通信隧道。", category: "计算机网络", favorite: false },
 { term: "Skeleton-to-Thought", translation: "思维框架（SoT） ", explanation: "一种人工智能推理方法，先构建问题解决的逻辑框架（骨架），再填充具体细节（思考），以提高大语言模型解决复杂问题的能力。", category: "人工智能", favorite: false },
 { term: "skip list", translation: "跳跃表", explanation: "一种有序的数据结构，通过建立多级索引来加速查找、插入和删除操作，是链表与二分查找思想的结合，时间复杂度平均为O(log n)。", category: "数据结构", favorite: false },
 { term: "SLA", translation: "服务水平协议、服务等级协议（Service Level Agreement）", explanation: "服务提供方与客户之间的一份正式协议，明确规定了服务应达到的质量、可用性、性能等具体可量化的指标标准。", category: "软件工程", favorite: false },
 { term: "Small", translation: "小型", explanation: "在软件开发中，常指一种编程范式或方法论，强调构建功能单一、职责明确的小型服务或组件，以提高系统的可维护性和灵活性。", category: "软件工程", favorite: false },
 { term: "smart endpoint", translation: "智能端点", explanation: "在微服务架构中，指每个服务自身包含完整的业务逻辑和决策能力，并通过轻量级通信机制进行交互，与服务总线模式相对。", category: "软件工程", favorite: false },
 { term: "snapshot", translation: "快照", explanation: "在计算机系统中，指在某一特定时间点对数据状态（如文件系统、数据库、虚拟机磁盘）的完整拷贝，常用于备份、恢复或版本回滚。", category: "计算机基础", favorite: false },
 { term: "SOA", translation: "面向服务的架构（Service-Oriented Architecture）", explanation: "一种软件架构风格，将应用程序的不同功能单元拆分为独立的服务，并通过定义良好的接口和协议进行通信，以实现松耦合。", category: "软件工程", favorite: false },
 { term: "SoT", translation: "思维框架（Skeleton-to-Thought） ", explanation: "一种人工智能推理方法，先构建问题解决的逻辑框架（骨架），再填充具体细节（思考），以提高大语言模型解决复杂问题的能力。", category: "人工智能", favorite: false },
 { term: "Software as a Service", translation: "软件即服务（Saas）", explanation: "云计算的一种服务模式，用户通过互联网直接使用提供商运行在云基础设施上的应用程序，无需管理底层硬件和软件平台。", category: "云计算", favorite: false },
 { term: "source lines of code", translation: "源代码行数（SLOC）", explanation: "一种衡量软件项目规模或复杂度的常用指标，指源代码中非空非注释的行数，常用于估算开发成本和工作量。", category: "软件工程", favorite: false },
 { term: "Speculative Hierarchy", translation: "凭空想象的层次结构", explanation: "Speculative Hierarchy 指在软件设计中，基于假设而非实际需求构建的层次结构，可能导致过度设计。", category: "软件工程", favorite: false },
 { term: "Split Temporary Variable", translation: "分解临时变量", explanation: "Split Temporary Variable 是重构技术，将一个临时变量拆分为多个，每个只承担单一职责，提高代码可读性。", category: "软件工程", favorite: false },
 { term: "sprint", translation: "冲刺（敏捷开发术语）", explanation: "Sprint 是敏捷开发中的固定时间周期（通常1-4周），团队在此期间完成一组预定义的任务。", category: "项目管理", favorite: false },
 { term: "sprint backlog", translation: "冲刺积压工作", explanation: "Sprint Backlog 是敏捷开发中，为当前冲刺选出的待完成任务列表，来自产品待办事项。", category: "项目管理", favorite: false },
 { term: "SQL Database", translation: "SQL 数据库", explanation: "SQL Database 是使用结构化查询语言（SQL）管理和查询的关系型数据库，如MySQL、PostgreSQL。", category: "数据库", favorite: false },
 { term: "SSKD", translation: "少量你所知道的开发人员（Small Set of Known Developers）", explanation: "SSKD 指在软件开发中，只有少数已知开发人员能访问或理解特定代码或系统部分的情况。", category: "软件工程", favorite: false },
 { term: "SSO", translation: "单点登录（Single Sign-On）", explanation: "SSO 是一种身份验证方案，允许用户使用一组凭证登录多个相关但独立的软件系统。", category: "网络安全", favorite: false },
 { term: "stage", translation: "阶段", explanation: "Stage 在开发流程中指一个特定步骤或时期，如开发、测试、部署阶段，用于划分工作。", category: "软件工程", favorite: false },
 { term: "Staging", translation: "过渡（环境）", explanation: "Staging 是模拟生产环境的环境，用于最终测试和验证应用程序，确保上线前稳定。", category: "软件工程", favorite: false },
 { term: "state indeterminism", translation: "状态不确定性", explanation: "State Indeterminism 指系统或程序的状态无法唯一确定，可能由于并发、随机性等因素导致。", category: "计算机基础", favorite: false },
 { term: "State-based testing", translation: "基于状态的测试", explanation: "一种软件测试方法，通过验证系统在不同状态下的行为是否符合预期来检测缺陷。", category: "测试", favorite: false },
 { term: "State Pattern", translation: "状态模式", explanation: "一种行为型设计模式，允许对象在其内部状态改变时改变其行为，看起来像是修改了类。", category: "设计模式", favorite: false },
 { term: "Stateless", translation: "无状态", explanation: "指系统或组件不保存客户端的状态信息，每个请求都包含处理所需的所有数据。", category: "软件工程", favorite: false },
 { term: "Sticky Session", translation: "黏性会话", explanation: "负载均衡中的一种会话管理方式，将同一用户的请求始终路由到同一台服务器，以保持会话状态。", category: "计算机网络", favorite: false },
 { term: "Stickyness", translation: "黏性；黏度", explanation: "在软件架构中，指组件或服务之间的耦合程度，高黏性意味着难以独立修改或替换。", category: "软件工程", favorite: false },
 { term: "story", translation: "故事（敏捷开发术语）", explanation: "敏捷开发中的需求描述单元，通常从用户角度描述一个功能或特性，作为开发任务的基础。", category: "项目管理", favorite: false },
 { term: "Storage", translation: "存储", explanation: "计算机中用于持久保存数据的硬件或软件组件，如硬盘、内存或云存储服务。", category: "计算机基础", favorite: false },
 { term: "Storage Account", translation: "存储账户", explanation: "云平台（如Azure）中用于管理存储资源的容器，可以包含Blob、文件、队列等存储服务。", category: "云计算", favorite: false },
 { term: "Strangler Application Pattern", translation: "绞杀者模式", explanation: "一种渐进式重构模式，通过逐步用新组件替换旧系统的部分功能，最终取代整个遗留系统。", category: "软件工程", favorite: false },
 { term: "strategic development tools", translation: "战略设计工具", explanation: "用于支持长期技术规划和架构设计的工具或方法，帮助团队对齐业务目标与技术决策。", category: "软件工程", favorite: false },
 { term: "Strategy Pattern", translation: "策略模式", explanation: "一种行为设计模式，定义一系列算法，封装每个算法，并使它们可以互相替换，让算法独立于使用它的客户端变化。", category: "设计模式", favorite: false },
 { term: "Stream", translation: "流", explanation: "在计算机中表示数据序列的抽象概念，用于处理输入输出操作，如文件读写或网络数据传输，支持顺序访问。", category: "计算机基础", favorite: false },
 { term: "Structural Design Patterns", translation: "结构性设计模式", explanation: "设计模式的一类，关注如何组合对象和类以形成更大的结构，例如适配器模式或代理模式，提高代码灵活性。", category: "设计模式", favorite: false },
 { term: "structure", translation: "结构", explanation: "在编程中组织数据的方式，如数组、链表或自定义类型，用于高效存储和访问信息，是构建程序的基础。", category: "数据结构", favorite: false },
 { term: "Structured Systems Analysis and Design Methodology", translation: "结构化系统分析和设计方法（SSADM）", explanation: "一种系统开发方法，通过结构化步骤分析需求、设计系统，强调文档化和阶段性验证，常用于大型项目。", category: "软件工程", favorite: false },
 { term: "Subnet", translation: "子网", explanation: "网络中的一个逻辑划分，将大网络分成多个小网络，以提高管理效率和安全性，通常通过IP地址和掩码实现。", category: "计算机网络", favorite: false },
 { term: "Subordinate", translation: "附属", explanation: "在计算机系统中指从属或辅助组件，如数据库中的从服务器，依赖主组件运行，用于分担负载或备份。", category: "计算机基础", favorite: false },
 { term: "Sub-region", translation: "子地域", explanation: "云计算或地理分区中的较小区域，用于资源部署和管理，提高可用性和性能，如AWS中的可用区。", category: "云计算", favorite: false },
 { term: "Subdomain", translation: "子领域", explanation: "域名系统（DNS）的一部分，是主域名的分支，用于组织网站内容，如blog.example.com中的blog。", category: "计算机网络", favorite: false },
 { term: "Subscription", translation: "订阅", explanation: "一种服务模式，用户定期支付费用以访问内容或功能，常见于软件即服务（SaaS）或流媒体平台。", category: "软件工程", favorite: false },
 { term: "Substitute Algorithm", translation: "替换算法1", explanation: "指在代码重构中，用更清晰或更高效的算法替换原有算法，而不改变其外部行为。", category: "软件工程", favorite: false },
 { term: "SW", translation: "Apache SkyWalking 的简写", explanation: "Apache SkyWalking 的简写，是一个开源的应用程序性能监控系统，用于分布式系统的观测和分析。", category: "开发工具", favorite: false },
 { term: "symbol table", translation: "符号表", explanation: "编译器或解释器使用的一种数据结构，用于存储程序中标识符（如变量名、函数名）的信息及其属性。", category: "数据结构", favorite: false },
 { term: "Synchronized Multimedia Integration Language", translation: "同步多媒体集成语言（SMIL）", explanation: "一种基于 XML 的标记语言，用于描述多媒体演示的时序、布局和交互，常用于网页中的音频和视频集成。", category: "前端开发", favorite: false },
 { term: "syntactic sugar", translation: "语法糖", explanation: "编程语言中一种使代码更易读或编写的语法特性，它不增加新功能，但提供了更便捷的表达方式。", category: "编程语言", favorite: false },
 { term: "System Under Test", translation: "测试目标系统（SUT）", explanation: "在软件测试中，指正在被测试的特定系统、组件或应用程序，是测试活动的焦点对象。", category: "测试", favorite: false },
 { term: "Table", translation: "表", explanation: "数据库中存储数据的基本结构，由行和列组成，用于组织和表示关系型数据。", category: "数据库", favorite: false },
 { term: "tactical development tools", translation: "战术实施工具", explanation: "在软件开发中，指用于解决具体、短期技术问题的工具或方法，侧重于即时实施而非长期战略规划。", category: "软件工程", favorite: false },
 { term: "TAP,", translation: "基于任务的异步模式", explanation: "基于任务的异步模式，是 .NET 中用于简化异步编程的一种设计模式，通过 Task 类来管理异步操作。", category: "设计模式", favorite: false },
 { term: "targeted testing", translation: "目标测试", explanation: "一种软件测试方法，专注于验证系统的特定功能、模块或需求，以确保其按预期工作。", category: "测试", favorite: false },
 { term: "Task-based Asynchronous Pattern", translation: "基于任务的异步模式", explanation: "一种异步编程模型，使用Task对象表示异步操作，通过async/await关键字简化异步代码的编写和维护。", category: "编程语言", favorite: false },
 { term: "TCP", translation: "传输控制协议（Transmission Control Protocol）", explanation: "一种面向连接的可靠传输协议，确保数据在网络中按序、无差错地传输，常用于Web浏览和文件传输。", category: "计算机网络", favorite: false },
 { term: "TDD", translation: "测试驱动开发（Test-Driven Development）", explanation: "一种软件开发方法，先编写测试用例，再编写实现代码，通过不断重构来确保代码质量和功能正确性。", category: "测试", favorite: false },
 { term: "Tease Apart Inheritance", translation: "梳理并分解继承体系", explanation: "一种重构技术，用于分解复杂的继承层次结构，通过提取类或接口来减少继承耦合，提高代码灵活性。", category: "软件工程", favorite: false },
 { term: "technical bankruptcy", translation: "技术破产", explanation: "指技术债务积累到无法通过常规手段修复的程度，导致系统难以维护或必须彻底重写，通常源于长期忽视代码质量。", category: "软件工程", favorite: false },
 { term: "Technical Debt", translation: "技术债务（TDBT）", explanation: "指在软件开发中，为快速实现功能而采用非最优方案所累积的额外维护成本，类似于债务，需后期偿还。", category: "软件工程", favorite: false },
 { term: "Template Method Pattern", translation: "模板方法模式", explanation: "一种行为设计模式，定义算法的骨架，将某些步骤延迟到子类中实现，允许子类在不改变算法结构的情况下重写特定步骤。", category: "设计模式", favorite: false },
 { term: "Tenant", translation: "租户", explanation: "在多租户架构中，指共享同一软件实例但数据相互隔离的独立用户或组织，常见于SaaS应用。", category: "云计算", favorite: false },
 { term: "Terminus", translation: "端点", explanation: "指API或网络服务的访问地址，通常是一个URL，用于标识和定位特定资源或服务端点。", category: "计算机网络", favorite: false },
 { term: "test doubles", translation: "测试替身", explanation: "指在单元测试中用于替代真实对象的模拟对象，如Mock、Stub等，以隔离被测代码并控制测试环境。", category: "测试", favorite: false },
 { term: "Test-Driven Development", translation: "测试驱动开发（TDD）", explanation: "一种软件开发方法，先编写测试用例，再编写代码使测试通过，最后重构代码以提高质量。", category: "软件工程", favorite: false },
 { term: "test harness", translation: "测试用具", explanation: "一组软件和测试数据，用于自动化测试执行，验证程序在不同条件下的行为是否符合预期。", category: "测试", favorite: false },
 { term: "the normalization of deviance", translation: "异常正常化", explanation: "指在软件开发或运维中，逐渐接受异常或错误行为作为正常情况，可能导致风险积累和系统故障。", category: "软件工程", favorite: false },
 { term: "Thin Client", translation: "瘦客户端", explanation: "一种客户端计算模型，依赖服务器处理大部分任务，本地只负责显示和简单输入，减少硬件需求。", category: "计算机网络", favorite: false },
 { term: "Thread", translation: "线程", explanation: "操作系统能够调度的最小执行单元，属于同一进程的线程共享内存空间，提高程序并发性能。", category: "操作系统", favorite: false },
 { term: "Thread Environment Block", translation: "线程环境块", explanation: "Windows操作系统中，每个线程拥有的数据结构，存储线程的特定信息，如线程本地存储和异常处理链。", category: "操作系统", favorite: false },
 { term: "Thread Kernel Object", translation: "线程内核对象", explanation: "操作系统内核中用于管理线程的数据结构，包含线程状态、优先级和上下文等信息，供内核调度使用。", category: "操作系统", favorite: false },
 { term: "Thread Pool", translation: "线程池", explanation: "一种管理多个线程的机制，预先创建一组线程并重复使用，以减少线程创建和销毁的开销，提高效率。", category: "操作系统", favorite: false },
 { term: "Thread Starvation", translation: "线程饥荒", explanation: "在多线程环境中，某些线程因优先级低或资源竞争而长时间无法获得CPU时间，导致执行延迟或停滞。", category: "操作系统", favorite: false },
 { term: "Throttle", translation: "节流；限速", explanation: "控制数据流或请求速率的技术，防止系统过载，常用于网络流量管理或API调用限制以保障稳定性。", category: "计算机网络", favorite: false },
 { term: "Timestamp", translation: "时间戳", explanation: "Timestamp 是表示特定时间点的数字或字符串，通常记录事件发生的日期和时间，用于日志记录、数据同步等场景。", category: "计算机基础", favorite: false },
 { term: "Throughput", translation: "吞吐量", explanation: "Throughput 指系统在单位时间内处理的数据量或任务数，衡量系统性能，如网络带宽或服务器处理能力。", category: "计算机网络", favorite: false },
 { term: "TNP", translation: "交通网络提供者（Transportation Network Providers）", explanation: "TNP 是交通网络提供者的缩写，指提供交通服务的平台或公司，如网约车服务，属于特定行业术语。", category: "其他", favorite: false },
 { term: "TOFU", translation: "首次使用时信任（Trust On First Use）", explanation: "TOFU 是首次使用时信任的缩写，指在首次连接时自动信任未知实体，常用于安全协议中简化初始设置。", category: "网络安全", favorite: false },
 { term: "Topic", translation: "主题", explanation: "Topic 在计算机中常指消息队列或发布-订阅系统中的主题，用于分类和路由消息，实现异步通信。", category: "软件工程", favorite: false },
 { term: "Topology", translation: "拓扑结构", explanation: "Topology 描述网络或系统中组件之间的连接和布局关系，如星型、总线型拓扑，影响性能和可靠性。", category: "计算机网络", favorite: false },
 { term: "Token", translation: "令牌", explanation: "Token 是用于身份验证或授权的凭证，如访问令牌，确保系统安全，允许用户或应用执行特定操作。", category: "网络安全", favorite: false },
 { term: "Top-level statements", translation: "顶级语句", explanation: "Top-level statements 指编程中无需显式定义主函数即可执行的代码，简化程序结构，常见于现代语言如C#。", category: "编程语言", favorite: false },
 { term: "ToT", translation: "思维树（Tree-of-Thought）", explanation: "ToT 是思维树的缩写，是一种人工智能推理方法，通过树状结构探索多种思路路径，提升问题解决能力。", category: "人工智能", favorite: false },
 { term: "TPL", translation: "任务并行库", explanation: "TPL 是任务并行库的缩写，是.NET框架中的库，用于简化并行编程，提高多核处理器上的应用性能。", category: "编程语言", favorite: false },
 { term: "(Code) Tracing", translation: "（代码）追踪", explanation: "指通过逐步执行代码来理解程序逻辑或调试的过程，常用于教学和问题排查。", category: "计算机基础", favorite: false },
 { term: "Transaction", translation: "事务", explanation: "数据库或系统中一组不可分割的操作单元，要么全部成功，要么全部失败，确保数据一致性。", category: "数据库", favorite: false },
 { term: "Transaction Script", translation: "事务脚本", explanation: "一种简单的设计模式，将业务逻辑直接组织在脚本中，常用于小型应用或快速原型开发。", category: "设计模式", favorite: false },
 { term: "Transient Error", translation: "瞬时错误", explanation: "指临时性、可自动恢复的错误，通常由网络波动或资源暂时不可用引起，无需人工干预。", category: "软件工程", favorite: false },
 { term: "Transparent Data Encryption", translation: "透明数据加密", explanation: "一种数据库加密技术，在存储和检索数据时自动加解密，对应用程序透明，增强数据安全性。", category: "数据库", favorite: false },
 { term: "Transportation Network Providers", translation: "交通网络提供者（TNP）", explanation: "指提供交通网络服务的公司或平台，如网约车服务，通过技术连接乘客与司机。", category: "其他", favorite: false },
 { term: "Tree-of-Thought", translation: "思维树（ToT）", explanation: "一种人工智能推理方法，通过树状结构探索多个思维路径，以提升复杂问题解决的准确性和效率。", category: "人工智能", favorite: false },
 { term: "Type Bloat", translation: "类型膨胀", explanation: "指在编程中过度使用或定义过多类型，导致代码库复杂、难以维护的现象，常见于静态类型语言。", category: "编程语言", favorite: false },
 { term: "UAT", translation: "用户验收测试（User Acceptance Testing）", explanation: "软件开发的最后测试阶段，由最终用户验证系统是否符合业务需求和预期，确保可交付使用。", category: "测试", favorite: false },
 { term: "Ubiquitous Computing", translation: "普存计算", explanation: "一种计算范式，强调计算能力无缝融入日常环境和对象中，用户无需直接操作设备，如物联网应用。", category: "计算机基础", favorite: false },
 { term: "Ubiquitous Language", translation: "统一语言", explanation: "统一语言是领域驱动设计中的核心概念，指在开发团队和业务专家之间建立一套共享的、无歧义的术语，确保沟通一致。", category: "软件工程", favorite: false },
 { term: "UDDI", translation: "通用描述、发现与集成服务（Universal Description, Discovery, and Integration）", explanation: "UDDI是一种基于Web的、分布式的注册服务标准，用于发布和发现Web服务，类似于服务目录。", category: "计算机网络", favorite: false },
 { term: "UI", translation: "用户界面，包括视觉设计、交互设计和用户体验（User Interface）", explanation: "UI是用户与软件或硬件交互的界面，包括视觉元素、交互逻辑和用户体验设计，旨在提升易用性。", category: "前端开发", favorite: false },
 { term: "Uncommitted", translation: "未提交（的）", explanation: "在数据库事务中，未提交的状态指事务尚未完成，数据修改可能被回滚，不持久化到数据库。", category: "数据库", favorite: false },
 { term: "Update Domain", translation: "更新域", explanation: "更新域是云计算或分布式系统中用于分组和管理服务更新的逻辑单元，确保高可用性，更新时仅影响部分实例。", category: "云计算", favorite: false },
 { term: "unbox", translation: "拆箱", explanation: "拆箱是将值类型从对象（如装箱后的引用类型）转换为原始值类型的过程，常见于C#等编程语言。", category: "编程语言", favorite: false },
 { term: "under-post", translation: "提交不足", explanation: "提交不足是Web安全漏洞，指表单提交时缺少必要参数或验证，可能导致数据不一致或安全风险。", category: "网络安全", favorite: false },
 { term: "undirected graph", translation: "无向图", explanation: "无向图是一种图数据结构，其中边没有方向，表示节点间双向关系，常用于建模网络或社交关系。", category: "数据结构", favorite: false },
 { term: "Unexploited Encapsulation", translation: "未利用封装", explanation: "未利用封装是代码坏味道，指类或模块的封装性未被充分使用，导致内部细节暴露，降低可维护性。", category: "软件工程", favorite: false },
 { term: "Unfactored Hierarchy", translation: "未归并的层次结构", explanation: "未归并的层次结构是代码坏味道，指继承层次中存在重复代码或结构，未通过重构合并，增加复杂度。", category: "软件工程", favorite: false },
 { term: "Unified Modeling Language", translation: "统一建模语言（UML）", explanation: "统一建模语言（UML）是一种标准化的建模语言，用于可视化、描述、构建和记录软件系统的结构和行为。", category: "软件工程", favorite: false },
 { term: "Uniform Interface", translation: "统一接口", explanation: "统一接口是REST架构风格的核心原则之一，要求所有资源通过一致的接口（如HTTP方法）进行访问，简化了系统交互。", category: "后端开发", favorite: false },
 { term: "Uniform Resource Locator", translation: "统一资源定位符（URL）", explanation: "统一资源定位符（URL）是互联网上用于标识和定位资源（如网页、文件）的地址字符串，由协议、域名和路径等组成。", category: "计算机网络", favorite: false },
 { term: "unit of work", translation: "工作单元", explanation: "工作单元是一种设计模式，用于管理一组相关操作（如数据库事务），确保它们作为一个原子单元执行，以维护数据一致性。", category: "设计模式", favorite: false },
 { term: "Unit test", translation: "单元测试", explanation: "单元测试是针对软件中最小可测试单元（如函数或方法）的自动化测试，用于验证其功能是否符合预期，确保代码质量。", category: "测试", favorite: false },
 { term: "unit test coverage", translation: "单元测试覆盖率", explanation: "单元测试覆盖率是衡量单元测试覆盖代码程度的指标，通常以百分比表示，用于评估测试的全面性和代码可靠性。", category: "测试", favorite: false },
 { term: "unit-testing harnesses", translation: "单元测试用例", explanation: "单元测试用例是用于执行单元测试的框架或工具集，提供测试环境、断言和运行机制，帮助自动化测试过程。", category: "测试", favorite: false },
 { term: "unmanaged code", translation: "非托管代码", explanation: "非托管代码是指在.NET等托管环境中，不由运行时（如CLR）直接管理的代码，通常涉及直接内存操作和外部资源调用。", category: "编程语言", favorite: false },
 { term: "Unmanaged Pointers", translation: "非托管指针", explanation: "非托管指针是在托管代码（如C#）中使用的指针类型，允许直接访问内存地址，通常用于与非托管代码交互或性能优化。", category: "编程语言", favorite: false },
 { term: "Unnecessary Abstract", translation: "不必要的抽象", explanation: "不必要的抽象是指在软件设计中过度使用抽象层，导致代码复杂化、难以维护，而没有带来实际好处，应避免以保持简洁性。", category: "软件工程", favorite: false },
 { term: "Unnecessary Hierarchy", translation: "不必要的层次结构", explanation: "指在软件设计中，过度使用层级结构导致代码复杂、维护困难，而没有带来实际价值的设计问题。", category: "软件工程", favorite: false },
 { term: "unnecessary overhead", translation: "不必要的开销", explanation: "指在计算机系统或程序中，引入的额外资源消耗（如时间、内存）对核心功能没有贡献，反而降低效率。", category: "计算机基础", favorite: false },
 { term: "Unutilized Abstraction", translation: "未用的抽象", explanation: "指在软件设计中，创建了抽象层或接口，但实际未被使用或过度设计，增加了不必要的复杂性。", category: "软件工程", favorite: false },
 { term: "Usability Review", translation: "可用性评估", explanation: "指对软件或产品的用户界面和交互进行评估，以确保其易用性、效率和用户满意度。", category: "前端开发", favorite: false },
 { term: "User Acceptance Test", translation: "接受度测试（UAT）", explanation: "指在软件开发末期，由最终用户执行测试，以验证系统是否符合业务需求和预期，决定是否接受交付。", category: "测试", favorite: false },
 { term: "User Analysis", translation: "用户分析", explanation: "指通过研究用户行为、需求和特征，为产品设计提供依据，以优化用户体验和功能。", category: "软件工程", favorite: false },
 { term: "User Datagram Protocol", translation: "用户数据报协议（UDP）", explanation: "是一种无连接的传输层协议，提供快速但不可靠的数据传输，常用于实时应用如视频流或DNS查询。", category: "计算机网络", favorite: false },
 { term: "User Interface", translation: "用户界面，包括视觉设计、交互设计和用户体验（UI）", explanation: "指用户与计算机系统交互的界面，包括视觉元素、交互逻辑和整体体验，旨在提升用户操作便利性。", category: "前端开发", favorite: false },
 { term: "User Mode Stack", translation: "用户模式栈", explanation: "指在操作系统中，用户进程运行时使用的栈内存区域，用于存储函数调用、局部变量等，与内核模式栈隔离。", category: "操作系统", favorite: false },
 { term: "Value Object", translation: "值对象", explanation: "是一种设计模式中的对象，其值由其属性决定，不可变且无标识，常用于表示简单数据如货币或日期。", category: "设计模式", favorite: false },
 { term: "variant", translation: "变体", explanation: "variant 指同一数据结构或对象的不同表现形式或版本，常用于表示可变的、具有多种可能状态的数据类型。", category: "数据结构", favorite: false },
 { term: "Variation Encapsulation Principle", translation: "变化封装原则（VEP）", explanation: "Variation Encapsulation Principle (VEP) 是一种软件设计原则，强调将系统中可能变化的部分封装起来，以提高代码的可维护性和扩展性。", category: "设计模式", favorite: false },
 { term: "versionable interaction contract", translation: "可以进行版本控制的交互契约", explanation: "versionable interaction contract 指在分布式系统中，服务间交互的契约（如API）支持版本控制，允许不同版本共存和演进。", category: "软件工程", favorite: false },
 { term: "Vertical Scale", translation: "垂直缩放", explanation: "Vertical Scale 指通过增加单个服务器的资源（如CPU、内存）来提升系统性能，与水平扩展相对。", category: "硬件架构", favorite: false },
 { term: "VES", translation: "虚拟执行系统（Visual Execution System）", explanation: "VES (虚拟执行系统) 是一种运行时环境，用于执行和管理虚拟化或跨平台的代码，常见于.NET等框架中。", category: "计算机基础", favorite: false },
 { term: "viscosity", translation: "粘滞性", explanation: "viscosity 在软件工程中，指系统或代码难以修改和演进的特性，高粘滞性通常意味着维护成本高。", category: "软件工程", favorite: false },
 { term: "VIP", translation: "虚拟 IP（或不译）", explanation: "VIP (虚拟IP) 是一个不绑定到特定物理网络接口的IP地址，常用于高可用性和负载均衡场景。", category: "计算机网络", favorite: false },
 { term: "VIP Swap", translation: "VIP 交换", explanation: "VIP Swap 是一种网络技术，允许在不中断服务的情况下，将虚拟IP地址从一个服务器切换到另一个服务器。", category: "计算机网络", favorite: false },
 { term: "Virtual Execution System", translation: "虚拟执行系统（VES）", explanation: "Virtual Execution System (虚拟执行系统) 是提供代码执行环境的软件层，支持跨平台运行和资源管理，如Java虚拟机。", category: "计算机基础", favorite: false },
 { term: "Virtual Network", translation: "虚拟网络", explanation: "Virtual Network 指通过软件定义的逻辑网络，在物理网络基础上创建隔离的、可定制的网络环境，常用于云计算。", category: "云计算", favorite: false },
 { term: "Virtual Machine", translation: "虚拟机", explanation: "虚拟机是一种软件模拟的计算机系统，可以在物理主机上运行多个独立的操作系统和应用，实现资源隔离和高效利用。", category: "操作系统", favorite: false },
 { term: "Virtual Private Network", translation: "虚拟专用网络（VPN）", explanation: "虚拟专用网络是一种通过加密技术在公共网络上建立安全连接的技术，用于远程访问和保护数据传输隐私。", category: "计算机网络", favorite: false },
 { term: "Virtual Reality", translation: "虚拟现实（VR）", explanation: "虚拟现实是一种计算机生成的模拟环境，用户可以通过头戴设备等交互沉浸其中，常用于游戏、培训和模拟。", category: "其他", favorite: false },
 { term: "viscosity", translation: "粘稠性", explanation: "粘稠性在计算机中通常指系统或代码的复杂性导致难以修改或维护的特性，影响软件的可维护性和灵活性。", category: "软件工程", favorite: false },
 { term: "Visitor Pattern", translation: "访问者模式", explanation: "访问者模式是一种行为设计模式，允许在不修改对象结构的情况下定义新操作，将算法与对象结构分离。", category: "设计模式", favorite: false },
 { term: "VLO", translation: "团体批量许可证；大量采购授权合约（Volume Licensing for Organizations）", explanation: "团体批量许可证是企业或组织大量采购软件授权的一种合约方式，通常提供成本优惠和集中管理功能。", category: "软件工程", favorite: false },
 { term: "VOL", translation: "团体批量许可证；大量采购授权合约（Volume Licensing for Organizations）", explanation: "团体批量许可证是企业或组织大量采购软件授权的一种合约方式，通常提供成本优惠和集中管理功能。", category: "软件工程", favorite: false },
 { term: "Volume Licensing for Organizations", translation: "团体批量许可证；大量采购授权合约（VOL 或 VLO）", explanation: "团体批量许可证是企业或组织大量采购软件授权的一种合约方式，通常提供成本优惠和集中管理功能。", category: "软件工程", favorite: false },
 { term: "VPC", translation: "虚拟私有云（Virtual Private Cloud）", explanation: "虚拟私有云是一种在公共云中创建的隔离网络环境，允许用户自定义网络配置并安全地部署资源。", category: "云计算", favorite: false },
 { term: "VPN", translation: "虚拟专用网络（Virtual Private Network）", explanation: "虚拟专用网络是一种通过加密技术在公共网络上建立安全连接的技术，用于远程访问和保护数据传输隐私。", category: "计算机网络", favorite: false },
 { term: "WCF", translation: "Windows 通讯开发平台（Windows Comminication Foundation）", explanation: "WCF是微软开发的用于构建面向服务的应用程序的框架，支持多种通信协议和数据格式，便于分布式系统间的交互。", category: "后端开发", favorite: false },
 { term: "Weak Generational Hypothesis", translation: "弱分代假设", explanation: "弱分代假设是垃圾回收中的理论，认为大多数对象生命周期很短，少数对象存活时间长，用于优化内存管理效率。", category: "编程语言", favorite: false },
 { term: "Wearable Device", translation: "可穿戴设备", explanation: "可穿戴设备是集成计算功能的便携式电子设备，如智能手表或眼镜，用于健康监测、通信或信息显示。", category: "硬件架构", favorite: false },
 { term: "Web Role", translation: "网站角色", explanation: "网站角色是云计算平台（如Azure）中的一种角色类型，专门用于托管和运行Web应用程序，提供可扩展的Web服务。", category: "云计算", favorite: false },
 { term: "Web Scraping", translation: "网络爬虫", explanation: "网络爬虫是自动从互联网上抓取和提取数据的程序或脚本，常用于搜索引擎、数据分析或内容聚合。", category: "软件工程", favorite: false },
 { term: "Web Service", translation: "网络服务", explanation: "网络服务是基于标准协议（如HTTP和XML）的软件系统，允许不同应用程序通过网络进行交互和数据交换。", category: "后端开发", favorite: false },
 { term: "Web Service Definition Language", translation: "Web 服务定义语言（WSDL）", explanation: "WSDL是一种基于XML的语言，用于描述网络服务的功能、位置和通信方式，使客户端能自动发现和使用服务。", category: "后端开发", favorite: false },
 { term: "Web Sites", translation: "网站", explanation: "网站是由多个网页组成的集合，通过互联网访问，提供信息、服务或交互功能，通常基于Web技术构建。", category: "前端开发", favorite: false },
 { term: "Weighted Method per Class", translation: "类累计圈复杂度（WMC）", explanation: "WMC是面向对象度量中的一个指标，计算类中所有方法的圈复杂度之和，用于评估类的复杂度和维护难度。", category: "软件工程", favorite: false },
 { term: "WF", translation: "工作流（WIndows Workflow）", explanation: "WF是微软的工作流框架，用于设计和执行自动化业务流程，支持可视化建模和与应用程序集成。", category: "后端开发", favorite: false },
 { term: "Wide Hierarchy", translation: "过宽的层次结构", explanation: "指在面向对象设计中，一个类拥有过多直接子类，导致继承结构过于扁平，可能影响代码的可维护性和扩展性。", category: "软件工程", favorite: false },
 { term: "Windows Comminication Foundation", translation: "分布式通信（WCF）", explanation: "微软开发的框架，用于构建面向服务的应用程序，支持跨进程和跨机器的分布式通信。", category: "后端开发", favorite: false },
 { term: "Windows Internet Name Service", translation: "Windows Internet 命名服务（WINS）", explanation: "微软的旧有网络服务，用于将NetBIOS名称解析为IP地址，主要在早期Windows网络中提供名称解析功能。", category: "计算机网络", favorite: false },
 { term: "Windows Management Instrumentation", translation: "Windows 管理规范（WMI）", explanation: "微软提供的一套管理工具和接口，允许通过脚本或程序来监控和控制Windows操作系统中的硬件、软件和网络组件。", category: "操作系统", favorite: false },
 { term: "Windows Presentation Foundation", translation: "富客户端表示（WPF）", explanation: "微软的UI框架，用于创建具有丰富图形和多媒体功能的Windows桌面应用程序，支持XAML标记语言。", category: "前端开发", favorite: false },
 { term: "Windows Workflow", translation: "工作流（WF）", explanation: "微软的框架，用于在应用程序中设计、执行和管理工作流，支持业务流程自动化和长时间运行的任务。", category: "软件工程", favorite: false },
 { term: "WINS", translation: "Windows Internet 命名服务（Windows Internet Name Service）", explanation: "Windows Internet Name Service的缩写，是一种将NetBIOS名称映射到IP地址的网络服务，用于早期Windows网络环境。", category: "计算机网络", favorite: false },
 { term: "WINS Proxy", translation: "WINS 代理", explanation: "一种网络组件，代表非WINS客户端向WINS服务器转发名称解析请求，以支持混合网络环境中的名称解析。", category: "计算机网络", favorite: false },
 { term: "WINS Resource", translation: "WINS 资源", explanation: "在WINS服务中，指可管理的对象，如静态映射或复制伙伴，用于配置和维护WINS数据库中的记录。", category: "计算机网络", favorite: false },
 { term: "wireless communication", translation: "无线通讯", explanation: "通过无线电波或红外线等无线介质传输数据和信息的技术，包括Wi-Fi、蓝牙、蜂窝网络等多种形式。", category: "计算机网络", favorite: false },
 { term: "WMI", translation: "Windows 管理规范（Windows Management Instrumentation）", explanation: "WMI是微软Windows操作系统中的一套管理技术，用于管理和监控本地或远程计算机的硬件、软件和系统信息。", category: "操作系统", favorite: false },
 { term: "Worker Role", translation: "辅助角色", explanation: "Worker Role是微软Azure云计算平台中的一种角色，用于运行后台处理任务，如数据处理或计算密集型操作，通常无用户界面。", category: "云计算", favorite: false },
 { term: "Workflow", translation: "工作流", explanation: "Workflow指一系列自动化或手动步骤，用于定义和管理业务流程，确保任务按顺序执行，提高效率和一致性。", category: "软件工程", favorite: false },
