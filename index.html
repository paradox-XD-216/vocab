 { term: "image", translation: "映像", explanation: "指计算机系统中文件或数据的完整副本，如操作系统映像或容器映像，用于快速部署或恢复环境。", category: "操作系统", favorite: false },
 { term: "immersion approach", translation: "沉浸法", explanation: "一种学习方法，通过完全沉浸在目标环境或语境中（如语言学习或编程实践）来加速技能掌握。", category: "其他", favorite: false },
 { term: "Imperative Abstraction", translation: "命令式抽象", explanation: "通过命令式编程风格（如顺序执行和状态变更）实现的抽象，隐藏底层细节，但强调操作步骤。", category: "编程语言", favorite: false },
 { term: "in-context learning", translation: "上下文学习 ", explanation: "机器学习中的一种技术，模型通过少量示例或上下文提示来学习任务，而无需大量额外训练数据。", category: "机器学习", favorite: false },
 { term: "Incomplete Abstraction", translation: "不完整的抽象", explanation: "指抽象设计未能完全隐藏底层复杂性或遗漏关键细节，导致使用困难或容易出错，常见于软件架构中。", category: "软件工程", favorite: false },
 { term: "index", translation: "索引", explanation: "索引是数据库中用于快速查找数据的数据结构，类似于书籍的目录，能显著提高查询效率。", category: "数据库", favorite: false },
 { term: "Information Architect", translation: "信息架构（IA）", explanation: "信息架构师负责组织和设计信息结构，确保用户能高效地查找和理解内容，常见于网站和软件设计。", category: "软件工程", favorite: false },
 { term: "Infrastructure as a Service", translation: "设施即服务（Iaas）", explanation: "设施即服务是云计算模型，提供虚拟化的计算资源如服务器和存储，用户按需租用而无需管理物理硬件。", category: "云计算", favorite: false },
 { term: "ingesting", translation: "摄取", explanation: "摄取指将数据从外部源导入到系统或数据库中进行处理和分析的过程，常用于大数据和数据处理场景。", category: "数据库", favorite: false },
 { term: "ingress", translation: "流入", explanation: "流入指数据或网络流量进入系统或网络的过程，在云计算和网络安全中常涉及流量管理和控制。", category: "计算机网络", favorite: false },
 { term: "Inline Class", translation: "将类内联化", explanation: "将类内联化是重构技术，将小类的功能直接移到使用它的类中，以减少不必要的类层次，简化代码结构。", category: "设计模式", favorite: false },
 { term: "Inline Method", translation: "内联函数", explanation: "内联函数是重构方法，将函数调用替换为函数体本身，以减少函数开销并简化代码，适用于简单函数。", category: "设计模式", favorite: false },
 { term: "Inline Temp", translation: "内联临时变量", explanation: "内联临时变量是重构技巧，将只使用一次的临时变量直接替换为其表达式，使代码更简洁易读。", category: "设计模式", favorite: false },
 { term: "input endpoint", translation: "输入端点", explanation: "输入端点是系统或网络中接收外部数据或请求的接口，常用于云计算和网络服务中定义访问点。", category: "计算机网络", favorite: false },
 { term: "instance", translation: "实例", explanation: "实例是类或模板在运行时的具体对象，在面向对象编程和云计算中表示资源的具体实现。", category: "计算机基础", favorite: false },
 { term: "Instance InputEndpoint", translation: "实例输入端点", explanation: "Instance InputEndpoint是云计算中虚拟机实例的网络端点，用于接收外部网络流量，通常与负载均衡器或防火墙规则关联。", category: "云计算", favorite: false },
 { term: "Instant Messaging", translation: "即时通讯（IM）", explanation: "Instant Messaging（即时通讯）是一种实时在线通信技术，允许用户通过互联网发送文本、语音或视频消息，如微信或Slack。", category: "计算机网络", favorite: false },
 { term: "instantiation", translation: "实例化", explanation: "实例化是面向对象编程中根据类创建具体对象的过程，将类的抽象定义转化为内存中的实际实例。", category: "编程语言", favorite: false },
 { term: "instantiator", translation: "实例化器", explanation: "实例化器是负责执行实例化操作的组件或工具，在编程中可能指工厂类或构造函数，用于生成对象实例。", category: "编程语言", favorite: false },
 { term: "instruction fine-tuning", translation: "指令微调", explanation: "指令微调是机器学习中针对特定任务对预训练模型进行进一步训练的过程，通过指令数据优化模型输出。", category: "机器学习", favorite: false },
 { term: "Insufficient Modularization", translation: "不充分的模块化", explanation: "不充分的模块化是软件设计中模块划分不足的问题，导致代码耦合度高、可维护性差，影响系统扩展性。", category: "软件工程", favorite: false },
 { term: "Interaction-based testing", translation: "基于交互的测试", explanation: "基于交互的测试是一种测试方法，关注组件间的交互行为，验证系统各部分在协作时是否符合预期。", category: "测试", favorite: false },
 { term: "Intercept", translation: "截取", explanation: "截取是在编程中拦截并处理方法调用或事件的过程，常用于实现日志记录、权限检查或性能监控等功能。", category: "编程语言", favorite: false },
 { term: "interception point", translation: "拦截点：可以编写测试来感知某些条件的地方", explanation: "拦截点是系统中可以插入自定义代码的位置，用于在特定条件触发时执行额外操作，如测试中的检查点。", category: "测试", favorite: false },
 { term: "intermediate language", translation: "中间语言（IL）", explanation: "中间语言（IL）是一种介于高级语言和机器码之间的低级语言，由编译器生成，用于跨平台执行或进一步优化。", category: "编程语言", favorite: false },
 { term: "Internal Endpoint", translation: "内部端点", explanation: "内部端点指在私有网络内部使用的服务访问点，通常不对外公开，用于内部系统间的通信。", category: "计算机网络", favorite: false },

 { term: "Internet Protocol", translation: "互联网协议（IP）", explanation: "互联网协议（IP）是计算机网络中用于寻址和路由数据包的核心协议，确保数据能在不同网络间传输。", category: "计算机网络", favorite: false },
 { term: "Interpreter Pattern", translation: "解释器模式", explanation: "解释器模式是一种行为设计模式，用于定义语言的文法表示，并解释执行语句，常用于实现简单语言或表达式求值。", category: "设计模式", favorite: false },
 { term: "interpolated strings", translation: "内插字符串", explanation: "内插字符串是一种编程特性，允许在字符串中直接嵌入变量或表达式，简化字符串拼接，提高代码可读性。", category: "编程语言", favorite: false },
 { term: "Introduce Assertion", translation: "引入断言", explanation: "引入断言是一种重构技术，在代码中添加条件检查以验证假设，帮助调试和确保程序正确性。", category: "软件工程", favorite: false },
 { term: "Introduce Explaining Variable", translation: "引入解释性变量", explanation: "引入解释性变量是一种重构技术，将复杂表达式的结果赋给临时变量，以增强代码可读性和可维护性。", category: "软件工程", favorite: false },
 { term: "Introduce Foreign Method", translation: "引入外加函数", explanation: "引入外加函数是一种重构技术，当需要为某个类添加方法但无法修改时，创建一个新函数来扩展功能。", category: "软件工程", favorite: false },
 { term: "Introduce Local Extension", translation: "引入本地扩展", explanation: "引入本地扩展是一种重构技术，通过创建新类来扩展现有类的功能，避免直接修改原始代码。", category: "软件工程", favorite: false },
 { term: "Introduce Null Object", translation: "引入 Null 对象", explanation: "引入Null对象是一种重构技术，用特定对象代替null值，避免空指针异常，简化代码中的空值检查。", category: "软件工程", favorite: false },
 { term: "Introduce Parameter Object", translation: "引入参数对象", explanation: "一种重构技术，将多个相关参数封装成一个对象，以提高代码可读性和可维护性。", category: "软件工程", favorite: false },
 { term: "Intrusion Detection Systems", translation: "入侵检测系统（IDS）", explanation: "监控网络或系统活动，检测恶意行为或策略违规的安全系统，通常用于报警。", category: "网络安全", favorite: false },
 { term: "Intrusion Prevention Systems", translation: "入侵预防系统（IPS）", explanation: "主动阻止检测到的网络攻击或安全威胁的安全系统，比IDS更积极，可实时干预。", category: "网络安全", favorite: false },
 { term: "Inversion of Control", translation: "控制反转（IoC）", explanation: "一种设计原则，将对象的创建和依赖管理交给外部容器控制，以降低组件耦合度。", category: "设计模式", favorite: false },
 { term: "Isolation", translation: "隔离性", explanation: "数据库事务的ACID特性之一，确保并发事务执行时互不干扰，每个事务独立运行。", category: "数据库", favorite: false },
 { term: "isomorphism", translation: "同构（数学领域专用术语）", explanation: "数学中两个结构在某种变换下保持相同性质的映射关系，常用于图论或代数领域。", category: "计算机基础", favorite: false },
 { term: "iterable", translation: "可迭代的", explanation: "指对象可以被遍历（如使用for循环），通常实现了__iter__()方法，返回一个迭代器。", category: "编程语言", favorite: false },

 { term: "iterator protocol", translation: "迭代器协议", explanation: "迭代器协议是一种允许对象按顺序访问其元素的标准方法，定义了如何遍历数据集合，常见于Python等语言中。", category: "编程语言", favorite: false },
 { term: "Job", translation: "作业", explanation: "作业在计算机中通常指操作系统或分布式系统中分配给处理器执行的任务单元，用于管理资源分配和调度。", category: "操作系统", favorite: false },

 { term: "Json Web Token", translation: "JSON Web 令牌", explanation: "JSON Web令牌是一种开放标准，用于在网络应用间安全传输信息作为JSON对象，常用于身份验证和授权。", category: "计算机网络", favorite: false },
 { term: "just-in-time compilation", translation: "即时编译，JIT 编译", explanation: "即时编译是一种程序优化技术，在运行时将代码编译为机器码以提高执行速度，常见于Java和JavaScript中。", category: "编程语言", favorite: false },
 { term: "JVM", translation: "Java 虚拟机（Java Virtual Machine）", explanation: "Java虚拟机是一个软件层，用于执行Java字节码，提供跨平台兼容性，并管理内存和垃圾回收等任务。", category: "编程语言", favorite: false },

 { term: "Key Opinion Leader", translation: "关键意见领袖（KOL），俗称大 V", explanation: "关键意见领袖是在社交媒体或特定领域有影响力的个人，常用于市场营销和产品推广，俗称大V。", category: "其他", favorite: false },
 { term: "Key Performance Indicator", translation: "关键绩效考核指标（KPI）", explanation: "关键绩效考核指标，用于衡量组织、团队或个人在特定目标上的表现和进展，是评估绩效的重要量化工具。", category: "项目管理", favorite: false },
 { term: "Key Space", translation: "键空间", explanation: "在密码学或数据库中，指所有可能的密钥或键的集合，用于加密、解密或数据索引操作。", category: "计算机基础", favorite: false },

 { term: "KPI", translation: "关键绩效考核指标（Key Performance Indicator）", explanation: "关键绩效考核指标，用于量化评估绩效，帮助组织监控目标达成情况并做出决策。", category: "项目管理", favorite: false },
 { term: "Language Integrated Query", translation: "语言集成查询（LINQ）", explanation: ".NET框架中的技术，允许在C#等语言中直接使用类似SQL的查询语法来操作数据集合。", category: "编程语言", favorite: false },
 { term: "Large", translation: "大型", explanation: "在软件开发中，指系统或组件的规模较大，通常涉及复杂功能、高负载或大量代码。", category: "软件工程", favorite: false },
 { term: "Large Language Model", translation: "大型语言模型（LLM） ", explanation: "基于大量文本数据训练的人工智能模型，能够理解和生成自然语言，如GPT系列模型。", category: "人工智能", favorite: false },
 { term: "Layered Architecture", translation: "分层架构", explanation: "一种软件架构模式，将系统划分为多个层次（如表示层、业务逻辑层、数据层），每层有特定职责。", category: "软件工程", favorite: false },
 { term: "LDAP", translation: "Lightweight Directory Access Protocol，轻型目录访问协议", explanation: "LDAP是一种用于访问和维护分布式目录服务的网络协议，常用于企业用户身份验证和资源管理。", category: "计算机网络", favorite: false },
 { term: "Leaky Encapsulation", translation: "泄露的封装", explanation: "泄露的封装指面向对象编程中，类的内部实现细节意外暴露给外部，破坏了封装性原则，可能导致代码脆弱。", category: "软件工程", favorite: false },
 { term: "Legacy system", translation: "遗留系统", explanation: "遗留系统指仍在使用的旧计算机系统、软件或技术，通常难以维护或升级，但对企业运营至关重要。", category: "软件工程", favorite: false },
 { term: "license", translation: "许可证", explanation: "许可证是法律文件，规定软件、技术或内容的使用权限、限制和条件，确保合规使用和保护知识产权。", category: "软件工程", favorite: false },
 { term: "lifetime", translation: "生命周期", explanation: "生命周期指软件、对象或资源从创建到销毁的整个过程，包括初始化、使用和清理等阶段。", category: "软件工程", favorite: false },
 { term: "Lightweight Directory Access Protocol", translation: "轻量级目录访问协议（LDAP）", explanation: "轻量级目录访问协议（LDAP）是简化版的目录访问协议，用于查询和修改目录服务，如用户信息存储。", category: "计算机网络", favorite: false },
 { term: "LINE of Business", translation: "业务线（LOB）", explanation: "业务线（LOB）指企业中核心的、产生收入的业务活动或系统，如财务、销售或生产管理软件。", category: "软件工程", favorite: false },
