 { term: "XOR", translation: "异或（Exclusive OR）", explanation: "XOR（异或）是一种逻辑运算，当两个输入值不同时输出为真，相同时输出为假。常用于编程中的位操作和加密算法。", category: "计算机基础", favorite: false },
 { term: "XUL", translation: "XML 用户界面语言（XML User Interface Language）", explanation: "XUL（XML用户界面语言）是一种基于XML的标记语言，用于创建跨平台应用程序的用户界面，主要用于Mozilla项目如Firefox。", category: "前端开发", favorite: false },
 { term: "YAGNI", translation: "原则，不需要原则（You Aren't Gonna Need It），“你不会用到它”", explanation: "YAGNI（你不会用到它）是软件工程中的一条原则，强调只实现当前需要的功能，避免过度设计，以提高开发效率。", category: "软件工程", favorite: false },
 { term: "Zero-downtime Upgrade", translation: "零停机升级", explanation: "零停机升级是一种系统维护技术，允许在不中断服务的情况下更新软件或硬件，确保高可用性。", category: "软件工程", favorite: false },
 { term: "zip disk", translation: "压缩磁盘", explanation: "压缩磁盘是一种物理存储介质，使用高容量可移动磁盘技术，主要用于数据备份和存储，现已较少使用。", category: "硬件架构", favorite: false },
 { term: "zone", translation: "区域", explanation: "区域在计算机网络中通常指DNS（域名系统）的一个部分，代表一个域名空间的管理范围，用于组织域名记录。", category: "计算机网络", favorite: false },
 { term: "zone list", translation: "区域列表", explanation: "区域列表是DNS中记录的多个区域的集合，用于管理和查询不同域名空间的信息，提高域名解析效率。", category: "计算机网络", favorite: false },
 { term: "zone transfer", translation: "区域传送", explanation: "区域传送是DNS中的一种机制，允许从主DNS服务器向从服务器复制区域数据，以确保数据一致性和冗余。", category: "计算机网络", favorite: false }
        ];

        // ==================== 状态管理 ====================
        let currentView = 'all';  // 'all' 或 'favorite'
        let currentCategory = '所有分类';
        let searchText = '';
        let expandedWord = null;  // 当前展开的单词term

        // ==================== 工具函数 ====================
        
        // 获取所有唯一分类
        function getUniqueCategories() {
            const categories = ['所有分类', ...new Set(words.map(w => w.category))];
            return categories;
        }

        // 获取分类下的单词数量
        function getCategoryCount(category) {
            if (category === '所有分类') {
                return getFilteredWordsByView('all').length;
            }
            return getFilteredWordsByView('all').filter(w => w.category === category).length;
        }

        // 获取收藏数量
        function getFavoriteCount() {
            return words.filter(w => w.favorite).length;
        }

        // 根据当前视图筛选（不考虑分类和搜索）
        function getFilteredWordsByView(view) {
            if (view === 'favorite') {
                return words.filter(w => w.favorite);
            }
            return words;  // all
        }

        // 获取最终显示的单词列表（综合考虑视图、分类、搜索）
        function getDisplayWords() {
            // 先按视图筛选（全部/收藏）
            let filtered = getFilteredWordsByView(currentView);
            
            // 再按分类筛选
            if (currentCategory !== '所有分类') {
                filtered = filtered.filter(w => w.category === currentCategory);
            }
            
            // 最后按搜索筛选
            if (searchText.trim() !== '') {
                const searchLower = searchText.toLowerCase().trim();
                filtered = filtered.filter(w => 
                    w.term.toLowerCase().includes(searchLower) ||
                    w.translation.toLowerCase().includes(searchLower) ||
                    w.explanation.toLowerCase().includes(searchLower) ||
                    w.category.toLowerCase().includes(searchLower)
                );
            }
            
            return filtered;
        }

        // ==================== 渲染函数 ====================
        
        // 渲染左侧分类列表
        function renderCategories() {
            const categories = getUniqueCategories();
            const categoryList = document.getElementById('categoryList');
            
            let html = '<div class="category-header">📌 分类</div>';
            
            categories.forEach(cat => {
                const count = getCategoryCount(cat);
                // 如果数量为0且不是"所有分类"，不显示
                if (count === 0 && cat !== '所有分类') return;
                
                let icon = '📁';
                if (cat === '所有分类') icon = '📋';
                else if (cat.includes('网络')) icon = '🌐';
                else if (cat.includes('数据')) icon = '🗄️';
                else if (cat.includes('设计')) icon = '🎨';
                else if (cat.includes('面向对象')) icon = '🔷';
                else if (cat.includes('操作')) icon = '⚙️';
                else if (cat.includes('开发')) icon = '🛠️';
                
                const isActive = (currentCategory === cat);
                
                html += `
                    <div class="category-item ${isActive ? 'active' : ''}" 
                         onclick="selectCategory('${cat.replace(/'/g, "\\'")}')">
                        <span class="category-name">
                            <span class="category-icon">${icon}</span>
                            ${cat}
                        </span>
                        <span class="category-count">${count}</span>
                    </div>
                `;
            });
            
            categoryList.innerHTML = html;
        }

        // 渲染右侧单词列表
        function renderWords() {
            const displayWords = getDisplayWords();
            const wordList = document.getElementById('wordList');
            
            // 更新统计信息
            const totalWords = getFilteredWordsByView('all').length;
            const favoriteCount = getFavoriteCount();
            const displayCount = displayWords.length;
            document.getElementById('stats').innerHTML = `📊 ${favoriteCount}⭐ / ${totalWords}词`;
            
            // 显示/隐藏清除搜索按钮
            const clearBtn = document.getElementById('clearBtn');
            if (searchText.trim() !== '') {
                clearBtn.style.display = 'inline-block';
            } else {
                clearBtn.style.display = 'none';
            }
            
            // 更新标签激活状态
            document.querySelectorAll('.tab')[0].className = currentView === 'all' ? 'tab active' : 'tab';
            document.querySelectorAll('.tab')[1].className = currentView === 'favorite' ? 'tab favorite active' : 'tab favorite';
            
            if (displayWords.length === 0) {
                let emptyMsg = '';
                if (searchText) {
                    emptyMsg = '🔍 没有找到匹配的单词';
                } else if (currentView === 'favorite') {
                    emptyMsg = '⭐ 收藏夹为空，点击单词上的⭐按钮添加收藏';
                } else if (currentCategory !== '所有分类') {
                    emptyMsg = `📁 分类“${currentCategory}”下没有单词`;
                } else {
                    emptyMsg = '📚 词库为空';
                }
                
                wordList.innerHTML = `<div class="empty-message">${emptyMsg}</div>`;
                return;
            }

            let html = '';
            displayWords.forEach(word => {
                const isExpanded = expandedWord === word.term;
                const isFavorite = word.favorite;
                
                html += `
                    <div class="word-item">
                        <div class="word-header" onclick="toggleExpand('${word.term.replace(/'/g, "\\'")}')">
                            <div class="word-term">
                                <span class="term-main">${word.term}</span>
                                <span class="term-translation">${word.translation}</span>
                            </div>
                            <div class="word-meta">
                                <span class="category-tag">${word.category}</span>
                                <span class="expand-icon">${isExpanded ? '▼' : '▶'}</span>
                            </div>
                        </div>
                        
                        ${isExpanded ? `
                            <div class="word-detail">
                                <div class="explanation-box">
                                    <div class="explanation-label">📖 解释</div>
                                    <div class="explanation-text">${word.explanation}</div>
                                </div>
                                <div class="word-actions">
                                    <button class="action-btn ${isFavorite ? 'favorite' : ''}" 
                                            onclick="toggleFavorite('${word.term.replace(/'/g, "\\'")}', event)">
                                        ${isFavorite ? '⭐ 已收藏' : '☆ 收藏'}
                                    </button>
                                    <button class="action-btn" onclick="copyTerm('${word.term}', event)">
                                        📋 复制
                                    </button>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            wordList.innerHTML = html;
        }

        // 更新所有视图
        function updateView() {
            renderCategories();
            renderWords();
        }

        // ==================== 交互函数 ====================
        
        // 选择分类
        function selectCategory(category) {
            currentCategory = category;
            expandedWord = null;  // 切换分类时收起所有展开的词
            updateView();
        }

        // 筛选收藏
        function filterByFavorite(showFavorite) {
            currentView = showFavorite ? 'favorite' : 'all';
            // 如果当前分类在收藏视图下没有单词，自动切换到所有分类
            if (currentView === 'favorite') {
                const hasWordsInCategory = words.some(w => w.favorite && (currentCategory === '所有分类' || w.category === currentCategory));
                if (!hasWordsInCategory) {
                    currentCategory = '所有分类';
                }
            }
            expandedWord = null;
            updateView();
        }

        // 搜索处理
        function handleSearch() {
            searchText = document.getElementById('searchInput').value;
            expandedWord = null;  // 搜索时收起所有
            updateView();
        }

        // 清除搜索
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            searchText = '';
            expandedWord = null;
            updateView();
        }

        // 展开/收起单词
        function toggleExpand(term) {
            if (expandedWord === term) {
                expandedWord = null;  // 收起
            } else {
                expandedWord = term;  // 展开
            }
            renderWords();  // 只重新渲染单词列表
        }

        // 切换收藏状态
        function toggleFavorite(term, event) {
            event.stopPropagation();  // 阻止事件冒泡，避免触发展开/收起
            
            const word = words.find(w => w.term === term);
            if (word) {
                word.favorite = !word.favorite;
                
                // 如果当前在收藏夹视图，且单词取消收藏，需要刷新
                if (currentView === 'favorite' && !word.favorite) {
                    // 如果当前分类下没有收藏的词了，可能需要调整
                    const hasFavoriteInCategory = words.some(w => 
                        w.favorite && (currentCategory === '所有分类' || w.category === currentCategory)
                    );
                    if (!hasFavoriteInCategory) {
                        currentCategory = '所有分类';
                    }
                    if (expandedWord === term) expandedWord = null;
                }
                
                updateView();
                saveToLocalStorage();
            }
        }

        // 复制术语
        function copyTerm(term, event) {
            event.stopPropagation();
            navigator.clipboard.writeText(term).then(() => {
                alert('✅ 已复制：' + term);
            });
        }

        // ==================== 数据持久化 ====================
        function saveToLocalStorage() {
            const favoriteStatus = words.map(w => ({term: w.term, favorite: w.favorite}));
            localStorage.setItem('vocabFavorites', JSON.stringify(favoriteStatus));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('vocabFavorites');
            if (saved) {
                try {
                    const favorites = JSON.parse(saved);
                    favorites.forEach(f => {
                        const word = words.find(w => w.term === f.term);
                        if (word) word.favorite = f.favorite;
                    });
                } catch (e) {
                    console.error('加载收藏数据失败', e);
                }
            }
        }

        // ==================== 初始化 ====================
        function init() {
            loadFromLocalStorage();
            updateView();
        }

        // 启动
        init();
    </script>
</body>

</html>
